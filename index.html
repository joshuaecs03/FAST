<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #111827; --sidebar-w: 240px; --border: #E5E7EB; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: white; height: 100vh; display: flex; overflow: hidden; }
        .hidden { display: none !important; }

        /* SIDEBAR (STATUS FILTERS) */
        #sidebar { width: var(--sidebar-w); background: #F9FAFB; border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; z-index: 100; flex-shrink: 0; }
        .sidebar-header { padding: 20px; font-family: 'Montserrat'; font-weight: 700; letter-spacing: 2px; border-bottom: 1px solid var(--border); }
        .nav-item { padding: 12px 20px; cursor: pointer; color: #4B5563; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .nav-item:hover, .nav-item.active { background: #F3F4F6; color: var(--ecs-orange); font-weight: 600; }
        .count { background: #E5E7EB; padding: 2px 8px; border-radius: 10px; font-size: 10px; color: #111827; }

        /* MAIN */
        #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        header { padding: 0 25px; height: 60px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .search-box input { width: 280px; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); outline: none; font-size: 13px; }

        /* DATA TABLE */
        .table-wrapper { flex: 1; overflow: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; white-space: nowrap; }
        th { background: white; padding: 12px; text-align: left; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 50; }
        td { padding: 10px 12px; border-bottom: 1px solid #F3F4F6; }
        tr:hover td { background: #FFF9F5; cursor: pointer; }

        /* LOGS DRAWER */
        #drawer { position: fixed; right: -500px; top: 0; width: 450px; height: 100vh; background: white; border-left: 1px solid var(--border); transition: 0.3s; z-index: 1000; box-shadow: -5px 0 20px rgba(0,0,0,0.05); }
        #drawer.open { right: 0; }
        .drawer-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 999; }
        #overlay.show { display: block; }
    </style>
</head>
<body>

    <div id="login-screen" style="position:fixed; width:100%; height:100%; background:#F3F4F6; z-index:5000; display:flex; justify-content:center; align-items:center;">
        <div style="background:white; padding:45px; border-radius:12px; text-align:center; width:320px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
            <h1 style="font-family:Montserrat; letter-spacing:4px; margin-bottom: 30px;">F<span style="color:var(--ecs-orange)">A</span>ST</h1>
            <input type="text" id="user" placeholder="Username" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
            <input type="password" id="pass" placeholder="Password" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
            <button onclick="handleLogin()" style="width:100%; padding:14px; background:var(--ecs-orange); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600; margin-top:10px;">Login</button>
            <p id="msg" style="color:#EF4444; font-size:11px; margin-top:15px; min-height:15px;"></p>
        </div>
    </div>

    <div id="overlay" onclick="closeDrawer()"></div>
    <div id="drawer">
        <div class="drawer-header">
            <div><h3 id="d-title" style="margin:0;">Job Logs</h3><small id="d-subtitle" style="color:#9CA3AF;"></small></div>
            <button onclick="closeDrawer()" style="border:none; background:none; cursor:pointer; font-size:20px;">✕</button>
        </div>
        <div id="d-content" style="padding:20px; overflow-y:auto; height:calc(100% - 80px);"></div>
    </div>

    <nav id="sidebar">
        <div class="sidebar-header">F<span style="color:var(--ecs-orange)">A</span>ST</div>
        <div style="padding: 15px 20px 5px; font-size: 11px; color: #9CA3AF; font-weight: 700; text-transform: uppercase;">Status Filters</div>
        <div id="status-nav"></div>
        <button onclick="logout()" style="margin-top:auto; padding:20px; background:none; border:none; color:#9CA3AF; cursor:pointer; border-top: 1px solid var(--border); font-size:12px;">Logout</button>
    </nav>

    <main id="main">
        <header>
            <h2 id="view-title" style="margin:0; font-size:1rem; font-weight: 600;">All Jobs</h2>
            <div class="search-box"><input type="text" id="q" placeholder="Search file, name, or client..." onkeyup="runFilters()"></div>
        </header>
        <div class="table-wrapper" id="table-output"></div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbys1p_6uN9upT77dculUMzENw3FCiB4jBiog206StyorhrC7fPrS63mLQvvthhmXIepMA/exec";
        let RAW_DATA = [], HEADERS = [], HASHES = {}, ACTIVE_FILTER = 'All';

        async function handleLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const res = await fetch(`${SCRIPT_URL}?action=verify_login&user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`);
            const data = await res.json();
            if (data.result === "success") {
                localStorage.setItem("fast_auth", "true");
                document.getElementById('login-screen').classList.add('hidden');
                init();
            } else { document.getElementById('msg').innerText = "Invalid Login Credentials"; }
        }

        async function init() {
            document.getElementById('login-screen').classList.add('hidden');
            await sync();
            setInterval(sync, 15000); // Surgical sync every 15s
        }

        async function sync() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=sync_surgical&hashes=${encodeURIComponent(JSON.stringify(HASHES))}`);
                const json = await res.json();
                if(json.result === "success") {
                    HEADERS = json.headers;
                    json.updates.forEach(u => {
                        const fIdx = HEADERS.indexOf("File Number");
                        const existing = RAW_DATA.findIndex(r => r[fIdx].toString() === u.data[fIdx].toString());
                        if(existing !== -1) RAW_DATA[existing] = u.data; else RAW_DATA.unshift(u.data);
                        HASHES[u.data[fIdx]] = u.hash;
                    });
                    buildNav(); runFilters();
                }
            } catch(e) {}
        }

        function buildNav() {
            const sIdx = HEADERS.indexOf("Status");
            const statuses = [...new Set(RAW_DATA.map(r => r[sIdx]))].filter(Boolean).sort();
            let html = `<div class="nav-item ${ACTIVE_FILTER==='All'?'active':''}" onclick="setFilter('All')"><span>All Jobs</span><span class="count">${RAW_DATA.length}</span></div>`;
            statuses.forEach(s => {
                const c = RAW_DATA.filter(r => r[sIdx] === s).length;
                html += `<div class="nav-item ${ACTIVE_FILTER===s?'active':''}" onclick="setFilter('${s}')"><span>${s}</span><span class="count">${c}</span></div>`;
            });
            document.getElementById('status-nav').innerHTML = html;
        }

        function setFilter(s) { ACTIVE_FILTER = s; document.getElementById('view-title').innerText = s === 'All' ? 'All Jobs' : s; buildNav(); runFilters(); }

        function runFilters() {
            const q = document.getElementById('q').value.toLowerCase();
            const sIdx = HEADERS.indexOf("Status");
            const filtered = RAW_DATA.filter(r => {
                const mS = (ACTIVE_FILTER === 'All' || r[sIdx] === ACTIVE_FILTER);
                const mQ = r.some(c => String(c).toLowerCase().includes(q));
                return mS && mQ;
            });
            renderTable(filtered);
        }

        function renderTable(rows) {
            const fIdx = HEADERS.indexOf("File Number"), nIdx = HEADERS.indexOf("File Name");
            let html = `<table><thead><tr>`;
            HEADERS.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            rows.forEach(r => {
                html += `<tr onclick="openDrawer('${r[fIdx]}','${r[nIdx]}')">`;
                r.forEach(c => html += `<td>${c || ''}</td>`);
                html += `</tr>`;
            });
            document.getElementById('table-output').innerHTML = html + `</tbody></table>`;
        }

        async function openDrawer(id, name) {
            document.getElementById('drawer').classList.add('open');
            document.getElementById('overlay').classList.add('show');
            document.getElementById('d-title').innerText = name || "Job History";
            document.getElementById('d-subtitle').innerText = "File #: " + id;
            const res = await fetch(`${SCRIPT_URL}?action=get_logs&fileNum=${id}`);
            const data = await res.json();
            document.getElementById('d-content').innerHTML = data.logs.map(l => `
                <div style="padding:15px; border-bottom:1px solid #F3F4F6; background:#fff; border-radius:8px; margin-bottom:10px; border:1px solid #eee;">
                    <strong style="color:var(--ecs-orange); font-size:12px;">${l.Type || 'Note'}</strong>
                    <p style="font-size:11px; margin:5px 0; color:#4B5563;">${l.Body || ''}</p>
                    <small style="color:#9CA3AF; font-size:10px;">${l.Timestamp || ''}</small>
                </div>`).join('') || "<p style='color:#9CA3AF;'>No history found for this project.</p>";
        }

        function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
        function logout() { localStorage.clear(); location.reload(); }
        window.onload = () => { if(localStorage.getItem("fast_auth") === "true") init(); };
    </script>
</body>
</html>
