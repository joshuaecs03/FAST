<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #111827; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #F9FAFB; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .login-card { background: white; padding: 50px; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 350px; }
        .btn-login { width: 100%; padding: 14px; background: var(--ecs-orange); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .hidden { display: none !important; }
        #dashboard { position: absolute; top:0; left:0; width: 100%; height: 100%; background: white; z-index: 100; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="letter-spacing: 4px; margin-bottom: 10px;">F<span style="color:var(--ecs-orange)">A</span>ST</h1>
            <p style="color: #6B7280; margin-bottom: 30px; font-size: 14px;">Domain Access: @ecs-asbestos.com</p>
            <button class="btn-login" onclick="startAuth()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_\"G\"_Logo.svg" width="18" alt="">
                Sign in with Google
            </button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <div style="padding: 40px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>FAST Management Portal</h2>
                <button onclick="logout()" style="background:none; border:1px solid #ddd; padding:8px 15px; border-radius:5px; cursor:pointer;">Logout</button>
            </div>
            <p id="user-info" style="color:#6B7280;"></p>
            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
            <div id="data-table">Loading Job Data...</div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzR6Wn5a7i7Ylx7k-QAmnqDokoigTuXj7pvNLKnUqCRMtjZG079HUX14LGNcDHkwgi0dA/exec";

        function startAuth() {
            // Open login popup
            window.open(`${SCRIPT_URL}?action=user_login`, "Auth", "width=500,height=600");
        }

        window.addEventListener("message", (event) => {
            if (event.data && event.data.result === "success") {
                localStorage.setItem("fast_auth", "true");
                localStorage.setItem("fast_user", event.data.email);
                showDashboard();
            } else if (event.data && event.data.result === "denied") {
                alert("ACCESS DENIED\n\nThe system detected: " + event.data.email + "\n\nOnly @ecs-asbestos.com accounts are permitted.");
            }
        }, false);

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-info').innerText = "Verified Session: " + localStorage.getItem("fast_user");
        }

        function logout() { localStorage.clear(); location.reload(); }
        window.onload = () => { if(localStorage.getItem("fast_auth") === "true") showDashboard(); };
    </script>
</body>
</html>
