<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST Portal | ECS Asbestos</title>
    <style>
        /* ECS BRANDING */
        :root { 
            --ecs-orange: #D4631E; 
            --ecs-dark: #333333;
            --ecs-gray: #fcfcfc;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; background-color: #f4f4f4; color: var(--ecs-dark);
            overflow: hidden; 
        }

        .hidden { display: none !important; }

        /* LOGIN SCREEN */
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-card { 
            background: white; padding: 40px; border-radius: 2px; 
            border: 1px solid #eee; border-top: 5px solid var(--ecs-orange);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 340px; text-align: center; 
        }
        h1 { color: var(--ecs-orange); font-size: 2.5rem; margin: 0 0 5px 0; letter-spacing: 4px; font-weight: 700; }
        .subtitle { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
        
        input { 
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; 
            background: var(--ecs-gray); font-size: 14px; outline: none; box-sizing: border-box;
        }
        
        button { 
            width: 100%; padding: 12px; background: var(--ecs-orange); color: white; 
            border: none; cursor: pointer; font-weight: 700; text-transform: uppercase; margin-top: 10px; 
        }

        /* DASHBOARD LAYOUT */
        header { 
            background: white; padding: 12px 25px; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 2px solid var(--ecs-orange);
        }
        
        .search-area { 
            padding: 20px; background: white; border-bottom: 1px solid #eee; 
            text-align: center;
        }

        #searchBar { 
            padding: 12px 20px; border: 1px solid #ddd; border-left: 5px solid var(--ecs-orange);
            font-size: 15px; width: 80%; max-width: 600px; border-radius: 4px; outline: none;
        }

        /* TABLE VIEW */
        .table-wrapper { overflow: auto; height: calc(100vh - 165px); background: white; width: 100%; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        
        th { 
            background-color: #fafafa; color: #888; font-size: 10px; 
            text-transform: uppercase; padding: 12px; border: 1px solid #eee;
            position: sticky; top: 0; z-index: 10;
        }
        
        td { border: 1px solid #f0f0f0; padding: 10px; text-align: left; white-space: nowrap; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        tr:hover { background-color: #fff9f5; }

        .loader-text { margin-top: 10px; color: var(--ecs-orange); font-size: 12px; font-weight: bold; }
        
        /* SPINNER */
        .spinner { 
            border: 3px solid #f3f3f3; border-top: 3px solid var(--ecs-orange); 
            border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; 
            display: inline-block; vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>FAST</h1>
            <div class="subtitle">Action Item Portal | ECS Asbestos</div>
            <input type="text" id="userInput" placeholder="Email Address">
            <input type="password" id="passInput" placeholder="Password">
            <button onclick="handleLogin()">Sign In</button>
            <p id="loginStatus" style="color: red; font-size: 11px; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <header>
            <div style="font-weight: 700; color: var(--ecs-orange); font-size: 1.1rem;">FAST PORTAL</div>
            <button onclick="logout()" style="padding: 5px 12px; font-size: 9px; background: #666; border: none; color: white; cursor: pointer;">LOGOUT</button>
        </header>
        
        <div class="search-area">
            <input type="text" id="searchBar" oninput="debounceSearch()" placeholder="Type Job #, State, or Client Name...">
            <div id="search-loader" class="loader-text hidden">
                <div class="spinner"></div>Searching Xcelerate Database...
            </div>
        </div>

        <div id="table-output" class="table-wrapper">
            <div style="padding: 60px; text-align: center; color: #ccc; font-style: italic;">
                Search results will appear here.
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwarttJ3JBpEyGUGCROHx7ctdpX9xEMj8qrgX48huawx5-xEWtvx55NU3oR-frBxDfcyQ/exec";
        let searchTimer;

        // Auto-login logic
        window.onload = function() {
            if (localStorage.getItem("fast_session") === "true") {
                showDashboard();
            }
        };

        async function handleLogin() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            const status = document.getElementById('loginStatus');
            
            status.style.color = "orange";
            status.innerText = "AUTHENTICATING...";

            try {
                const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`);
                const data = await res.json();
                
                if(data.result === "success") {
                    localStorage.setItem("fast_session", "true");
                    showDashboard();
                } else {
                    status.style.color = "red";
                    status.innerText = "INVALID EMAIL OR PASSWORD";
                }
            } catch(e) {
                status.innerText = "SERVER CONNECTION ERROR";
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        // DEBOUNCE SEARCH: Waits 400ms after you stop typing before asking Google
        function debounceSearch() {
            clearTimeout(searchTimer);
            const q = document.getElementById("searchBar").value;
            
            if (q.length < 2) {
                document.getElementById("table-output").innerHTML = '<div style="padding: 60px; text-align: center; color: #ccc; font-style: italic;">Search results will appear here.</div>';
                return;
            }
            
            document.getElementById("search-loader").classList.remove("hidden");
            searchTimer = setTimeout(() => executeServerSearch(q), 400); 
        }

        async function executeServerSearch(query) {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=search&q=${encodeURIComponent(query)}`);
                const json = await res.json();
                renderTable(json.headers, json.data);
            } catch(e) {
                document.getElementById("table-output").innerHTML = '<p style="text-align:center; color:red;">Search failed. Check connection.</p>';
            } finally {
                document.getElementById("search-loader").classList.add("hidden");
            }
        }

        function renderTable(headers, rows) {
            const output = document.getElementById("table-output");
            if (!rows || rows.length === 0) {
                output.innerHTML = "<p style='text-align:center; padding:50px; color:#999;'>No matches found in Xcelerate Data.</p>";
                return;
            }
            
            let html = `<table><thead><tr>`;
            headers.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            
            rows.forEach(row => {
                html += `<tr>`;
                row.forEach(cell => html += `<td>${cell || ''}</td>`);
                html += `</tr>`;
            });
            
            html += `</tbody></table>`;
            output.innerHTML = html;
        }
    </script>
</body>
</html>
