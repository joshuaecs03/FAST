<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #111827; --ecs-border: #E5E7EB; --ecs-bg: #F9FAFB; --sidebar-width: 280px; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--ecs-bg); color: var(--ecs-dark); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        #dashboard { display: flex; height: 100vh; }
        #sidebar { width: var(--sidebar-width); background: #1F2937; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 30px; border-bottom: 1px solid #374151; }
        .sidebar-logo { font-family: 'Montserrat', sans-serif; color: white; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; font-size: 1.6rem; }
        .sidebar-logo span { color: var(--ecs-orange); }
        .nav-label { font-size: 10px; color: #6B7280; padding: 25px 30px 5px 30px; text-transform: uppercase; font-weight: 600; }
        .nav-item { padding: 16px 30px; cursor: pointer; font-size: 13px; color: #9CA3AF; transition: 0.2s; border-left: 4px solid transparent; display: flex; align-items: center; justify-content: space-between; }
        .nav-item.active { background: #111827; color: white; border-left: 4px solid var(--ecs-orange); font-weight: 600; }
        .nav-count { font-size: 10px; background: #374151; color: #9CA3AF; padding: 2px 8px; border-radius: 10px; }
        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
        header { background: white; padding: 0 30px; height: 70px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ecs-border); }
        .controls-area { padding: 15px 30px; border-bottom: 1px solid var(--ecs-border); display: flex; align-items: center; gap: 15px; background: #fff; }
        #searchBar { flex: 1; padding: 12px 20px; border: 1px solid var(--ecs-border); border-radius: 50px; outline: none; font-size: 14px; }
        .col-manager { position: relative; }
        #col-btn { background: white; border: 1px solid var(--ecs-border); padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .col-dropdown { position: absolute; right: 0; top: 120%; background: white; border: 1px solid var(--ecs-border); border-radius: 12px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); z-index: 100; width: 280px; padding: 10px; max-height: 450px; overflow-y: auto; }
        .col-item { display: flex; align-items: center; gap: 12px; padding: 8px; font-size: 12px; cursor: move; border-radius: 6px; }
        .table-wrapper { flex: 1; overflow: auto; margin: 20px; border: 1px solid var(--ecs-border); border-radius: 8px; }
        table { width: max-content; min-width: 100%; border-collapse: separate; border-spacing: 0; font-size: 11px; table-layout: fixed; } 
        th { background: #F9FAFB; padding: 0; position: sticky; top: 0; text-align: left; z-index: 10; border-bottom: 2px solid var(--ecs-border); border-right: 1px solid #f0f0f0; }
        .th-content { padding: 14px 15px; display: flex; align-items: center; position: relative; height: 100%; box-sizing: border-box; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--ecs-border); color: #374151; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        tr:hover td { background-color: #FFF9F5; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="text-align:center; padding-top:15vh;">
            <div class="sidebar-logo" style="color:black; font-size:3rem;">F<span>A</span>ST</div>
            <div style="width:320px; margin:40px auto; background:white; padding:40px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.05);">
                <input type="text" id="u" placeholder="Email" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
                <input type="password" id="p" placeholder="Password" style="width:100%; padding:12px; margin-bottom:25px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
                <button onclick="handleLogin()" id="login-btn" style="width:100%; padding:14px; background:var(--ecs-orange); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600;">Sign In</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav id="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo">F<span>A</span>ST</div></div>
            <div class="nav-label">Status Views</div>
            <div class="nav-item active" onclick="setView('All Jobs', this)"><span>All Jobs</span><span class="nav-count" id="count-all">-</span></div>
            <div style="margin-top:auto; padding:20px; border-top:1px solid #374151;"><button onclick="logout()" style="width:100%; background:none; border:1px solid #4B5563; color:#9CA3AF; padding:10px; cursor:pointer; border-radius:6px;">Logout</button></div>
        </nav>
        <main id="main-content">
            <header><h2 id="view-title" style="margin:0;">All Jobs</h2><div id="sync-status" style="font-size:11px; color:#9CA3AF;">Initializing...</div></header>
            <div class="controls-area">
                <input type="text" id="searchBar" oninput="instantSearch()" placeholder="Search data...">
                <div class="col-manager">
                    <button id="col-btn" onclick="toggleColMenu()">⚙ Columns</button>
                    <div id="col-dropdown" class="col-dropdown hidden"><div id="col-list"></div></div>
                </div>
            </div>
            <div class="table-wrapper"><div id="table-output"></div></div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbys1p_6uN9upT77dculUMzENw3FCiB4jBiog206StyorhrC7fPrS63mLQvvthhmXIepMA/exec";
        
        let UI_CACHE = JSON.parse(localStorage.getItem('fast_data_cache') || "[]");
        let ROW_HASHES = JSON.parse(localStorage.getItem('fast_hash_cache') || "{}");
        let HEADERS = JSON.parse(localStorage.getItem('fast_headers_cache') || "[]");
        
        let CURRENT_VIEW = 'All Jobs', COLUMN_DEFS = [];
        const DEFAULT_VISIBLE = ["File Number", "File Name", "Status", "Customer Name", "Insurance Company"];

        window.onload = () => { 
            if (localStorage.getItem("fast_active") === "true") {
                init(); 
                if(UI_CACHE.length > 0) { loadColumnSettings(); renderTable(); }
            } 
        };

        async function handleLogin() {
            const u = document.getElementById('u').value, p = document.getElementById('p').value;
            const btn = document.getElementById('login-btn');
            btn.innerText = "Authenticating...";
            
            try {
                const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`, { method: 'GET', mode: 'cors', redirect: 'follow' });
                const data = await res.json();
                
                if(data.result === "success") { 
                    localStorage.setItem("fast_active", "true"); 
                    init(); 
                } else {
                    alert("Denied: " + (data.reason || "Invalid Login"));
                    btn.innerText = "Sign In";
                }
            } catch (e) { 
                alert("Connection error. Ensure deployment is set to 'Anyone'.");
                btn.innerText = "Sign In";
            }
        }

        async function init() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            await performSurgicalSync();
            setInterval(performSurgicalSync, 15000); 
        }

        async function performSurgicalSync() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=sync_surgical&hashes=${encodeURIComponent(JSON.stringify(ROW_HASHES))}`, { method: 'GET', mode: 'cors', redirect: 'follow' });
                const json = await res.json();
                if (json.result === "success") {
                    HEADERS = json.headers;
                    localStorage.setItem('fast_headers_cache', JSON.stringify(HEADERS));
                    if (COLUMN_DEFS.length === 0) loadColumnSettings();
                    if (json.updates.length > 0) {
                        const fNumIdx = HEADERS.indexOf("File Number");
                        json.updates.forEach(up => {
                            const fNum = up.data[fNumIdx].toString();
                            const exIdx = UI_CACHE.findIndex(r => r[fNumIdx].toString() === fNum);
                            if(exIdx !== -1) UI_CACHE[exIdx] = up.data; else UI_CACHE.unshift(up.data);
                            ROW_HASHES[fNum] = up.hash;
                        });
                        localStorage.setItem('fast_data_cache', JSON.stringify(UI_CACHE));
                        localStorage.setItem('fast_hash_cache', JSON.stringify(ROW_HASHES));
                        renderTable();
                    }
                }
                document.getElementById('sync-status').innerText = "✓ Connected: " + new Date().toLocaleTimeString();
            } catch (e) { document.getElementById('sync-status').innerText = "⚠ Sync Error"; }
        }

        function loadColumnSettings() {
            COLUMN_DEFS = HEADERS.map(h => ({ name: h, visible: DEFAULT_VISIBLE.includes(h), width: 140 }));
            renderColMenu();
        }

        function renderTable() {
            const visibleDefs = COLUMN_DEFS.filter(d => d.visible);
            const q = document.getElementById("searchBar").value.toUpperCase();
            let filtered = UI_CACHE.filter(row => row.join(" ").toUpperCase().includes(q));
            
            let html = `<table><thead><tr>`;
            visibleDefs.forEach(def => html += `<th style="width: ${def.width}px"><div class="th-content"><span>${def.name}</span></div></th>`);
            html += `</tr></thead><tbody>`;
            filtered.forEach(r => {
                html += `<tr>`;
                visibleDefs.forEach(def => html += `<td>${r[HEADERS.indexOf(def.name)] || ''}</td>`);
                html += `</tr>`;
            });
            document.getElementById('table-output').innerHTML = html + `</tbody></table>`;
            document.getElementById('count-all').innerText = filtered.length;
        }

        function toggleColMenu() { document.getElementById('col-dropdown').classList.toggle('hidden'); }
        function renderColMenu() { 
            let html = ''; 
            COLUMN_DEFS.forEach((def, i) => html += `<div class="col-item"><input type="checkbox" ${def.visible ? 'checked' : ''} onchange="toggleVisible(${i})"><span>${def.name}</span></div>`); 
            document.getElementById('col-list').innerHTML = html; 
        }
        function toggleVisible(i) { COLUMN_DEFS[i].visible = !COLUMN_DEFS[i].visible; renderTable(); }
        function instantSearch() { renderTable(); }
        function setView(v, el) { CURRENT_VIEW = v; renderTable(); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
