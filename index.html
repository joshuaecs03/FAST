<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FAST Portal</title>
    <style>
        :root { --primary: #003366; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; text-align: center; }
        .hidden { display: none !important; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 300px; margin: 100px auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; }
        header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; }
        .table-wrapper { padding: 20px; overflow: auto; height: 80vh; background: white; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; white-space: nowrap; }
        th { background: #f2f2f2; position: sticky; top: 0; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card">
            <h1>FAST</h1>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="login()">Login</button>
            <p id="status" style="color: red;"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <header>
            <strong>FAST PORTAL</strong>
            <button onclick="location.reload()" style="width:auto; padding:5px 10px;">Logout</button>
        </header>
        <div class="table-wrapper" id="output">Loading Data...</div>
    </div>

    <script>
        const URL = "YOUR_EXEC_URL_HERE";

        async function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const status = document.getElementById('status');
            
            status.innerText = "Checking...";
            
            try {
                const res = await fetch(`${URL}?action=login&username=${u}&password=${p}`);
                const data = await res.json();
                
                if(data.result === "success") {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    loadData();
                } else {
                    status.innerText = data.message;
                }
            } catch(e) {
                status.innerText = "Connection Error";
            }
        }

        async function loadData() {
            const res = await fetch(`${URL}?action=getData`);
            const json = await res.json();
            const data = json.data;
            
            let html = `<table><thead><tr>`;
            data[0].forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            data.slice(1).forEach(row => {
                html += `<tr>`;
                row.forEach(cell => html += `<td>${cell || ''}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('output').innerHTML = html;
        }
    </script>
</body>
</html>
