<!DOCTYPE html>
<html>
<head>
    <title>Xcelerate Data Portal</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        .hidden { display: none; }
        /* Login Styles */
        #login-container { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; cursor: pointer; }
        /* Dashboard Styles */
        nav { background: var(--primary); color: white; padding: 1rem; display: flex; justify-content: space-between; }
        .container { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; white-space: nowrap; }
        th { background: #eee; position: sticky; top: 0; }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="card">
            <h2>Xcelerate Login</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="handleLogin()">Sign In</button>
            <p id="msg" style="color:red"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav>
            <span>Xcelerate Data Portal</span>
            <button onclick="location.reload()" style="width:auto; padding: 5px 15px;">Logout</button>
        </nav>
        <div class="container">
            <h3>Active Records</h3>
            <div id="table-wrapper">Loading data...</div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

        async function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const res = await fetch(`${SCRIPT_URL}?action=login&username=${u}&password=${p}`);
            const data = await res.json();

            if(data.result === "success") {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('msg').innerText = "Login Failed";
            }
        }

        async function loadData() {
            const res = await fetch(`${SCRIPT_URL}?action=getData`);
            const data = await res.json();
            
            let html = `<table><thead><tr>`;
            // Get headers from first row keys
            Object.keys(data[0]).forEach(key => html += `<th>${key}</th>`);
            html += `</tr></thead><tbody>`;
            
            data.forEach(row => {
                html += `<tr>`;
                Object.values(row).forEach(val => html += `<td>${val || ''}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('table-wrapper').innerHTML = html;
        }
    </script>
</body>
</html>
