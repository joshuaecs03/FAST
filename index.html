<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #111827; --ecs-border: #E5E7EB; --ecs-bg: #F9FAFB; --sidebar-width: 280px; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--ecs-bg); color: var(--ecs-dark); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* DASHBOARD */
        #dashboard { display: flex; height: 100vh; }
        #sidebar { width: var(--sidebar-width); background: #1F2937; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 30px; border-bottom: 1px solid #374151; }
        .sidebar-logo { font-family: 'Montserrat', sans-serif; color: white; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; font-size: 1.6rem; }
        .sidebar-logo span { color: var(--ecs-orange); }

        .nav-label { font-size: 10px; color: #6B7280; padding: 25px 30px 5px 30px; text-transform: uppercase; font-weight: 600; }
        .nav-item { padding: 16px 30px; cursor: pointer; font-size: 13px; color: #9CA3AF; transition: 0.2s; border-left: 4px solid transparent; display: flex; justify-content: space-between; }
        .nav-item.active { background: #111827; color: white; border-left: 4px solid var(--ecs-orange); font-weight: 600; }
        .nav-count { font-size: 10px; background: #374151; color: #9CA3AF; padding: 2px 8px; border-radius: 10px; }

        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
        header { background: white; padding: 0 30px; height: 70px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ecs-border); }
        .search-area { padding: 20px 30px; border-bottom: 1px solid var(--ecs-border); }
        #searchBar { width: 100%; padding: 14px 20px; border: 1px solid var(--ecs-border); border-radius: 50px; outline: none; box-sizing: border-box; }

        .table-wrapper { flex: 1; overflow: auto; margin: 20px; border: 1px solid var(--ecs-border); border-radius: 8px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12px; }
        th { background: #F9FAFB; padding: 16px; position: sticky; top: 0; text-align: left; font-size: 10px; color: #6B7280; text-transform: uppercase; border-bottom: 1px solid var(--ecs-border); z-index: 10; }
        td { padding: 12px 16px; border-bottom: 1px solid var(--ecs-border); white-space: nowrap; }
        tr:hover td { background-color: #FFF9F5; }

        /* LOGIN */
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: #f3f4f6; }
        .login-card { background: white; padding: 60px; border-radius: 12px; width: 340px; text-align: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <div class="sidebar-logo" style="color:black; font-size:3rem; margin-bottom:40px;">F<span>A</span>ST</div>
            <input type="text" id="u" placeholder="Email" style="width:100%; padding:14px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
            <input type="password" id="p" placeholder="Password" style="width:100%; padding:14px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px;">
            <button onclick="handleLogin()" style="width:100%; padding:14px; background:var(--ecs-orange); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600;">LOGIN</button>
            <p id="loginStatus" style="color:red; font-size:12px; margin-top:15px;"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav id="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo">F<span>A</span>ST</div></div>
            <div class="nav-label">Dashboard</div>
            <div class="nav-item active" onclick="setView('All Jobs', this)"><span>All Jobs</span><span class="nav-count" id="count-all">-</span></div>
            <div class="nav-item" onclick="setView('Completed Jobs', this)"><span>Completed</span><span class="nav-count" id="count-comp">-</span></div>
            <div style="margin-top:auto; padding:20px;"><button onclick="logout()" style="width:100%; background:none; border:1px solid #4B5563; color:#9CA3AF; padding:8px; cursor:pointer;">Logout</button></div>
        </nav>
        <main id="main-content">
            <header>
                <h2 id="view-title" style="margin:0;">All Jobs</h2>
                <div id="sync-status" style="font-size:11px; color:#9CA3AF;">Initializing...</div>
            </header>
            <div class="search-area"><input type="text" id="searchBar" oninput="instantSearch()" placeholder="Search Jobs..."></div>
            <div class="table-wrapper"><div id="table-output"></div></div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoO-wu2p2j463ePFB5kW59yv45-hxBo7gV8EK0hqbV5t5q1MVn2K8nvWIOFmk4Q0OxSA/exec";
        
        let UI_CACHE = [];       // Master data for the UI
        let ROW_HASHES = {};     // Content fingerprints
        let HEADERS = [];
        let CURRENT_VIEW = 'All Jobs';

        window.onload = () => { if (localStorage.getItem("fast_active") === "true") init(); };

        async function handleLogin() {
            const u = document.getElementById('u').value, p = document.getElementById('p').value;
            const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`);
            const data = await res.json();
            if(data.result === "success") { localStorage.setItem("fast_active", "true"); init(); }
            else { document.getElementById('loginStatus').innerText = "Access Denied"; }
        }

        async function init() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            await performSurgicalSync();
            setInterval(performSurgicalSync, 15000); // Check every 15 seconds
        }

        async function performSurgicalSync() {
            try {
                // We send our current fingerprints to Google
                const res = await fetch(`${SCRIPT_URL}?action=sync_surgical&hashes=${encodeURIComponent(JSON.stringify(ROW_HASHES))}`);
                const json = await res.json();

                if (json.result === "busy") {
                    document.getElementById('sync-status').innerText = "Sync paused (Backend empty)";
                    return;
                }

                if (json.result === "success" && json.updates.length > 0) {
                    HEADERS = json.headers;
                    const fileNumIdx = HEADERS.indexOf("File Number");

                    // SURGICAL PATCH: Update only the rows that changed
                    json.updates.forEach(update => {
                        const fileNum = update.data[fileNumIdx].toString();
                        const existingIdx = UI_CACHE.findIndex(r => r[fileNumIdx].toString() === fileNum);
                        
                        if (existingIdx !== -1) {
                            UI_CACHE[existingIdx] = update.data; // Overwrite 1 row
                        } else {
                            UI_CACHE.unshift(update.data); // It's a new row
                        }
                        ROW_HASHES[fileNum] = update.hash; // Save the new fingerprint
                    });

                    instantSearch(); // Redraw the UI
                    updateCounts();
                    document.getElementById('sync-status').innerText = "✓ Updated: " + new Date().toLocaleTimeString();
                } else {
                    document.getElementById('sync-status').innerText = "✓ Live: " + new Date().toLocaleTimeString();
                }
            } catch (e) { document.getElementById('sync-status').innerText = "⚠ Reconnecting..."; }
        }

        function instantSearch() {
            const q = document.getElementById("searchBar").value.toUpperCase();
            const statusIdx = HEADERS.indexOf("Status");
            const filtered = UI_CACHE.filter(row => {
                const matchesView = (CURRENT_VIEW === 'All Jobs' || row[statusIdx] === CURRENT_VIEW);
                return matchesView && row.join(" ").toUpperCase().includes(q);
            }).slice(0, 100);
            render(filtered);
        }

        function render(rows) {
            const out = document.getElementById('table-output');
            if (!rows.length) { out.innerHTML = '<div style="text-align:center; padding:100px;">No records.</div>'; return; }
            let html = `<table><thead><tr>`;
            HEADERS.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            rows.forEach(r => {
                html += `<tr>`;
                r.forEach(cell => html += `<td>${cell || ''}</td>`);
                html += `</tr>`;
            });
            out.innerHTML = html + `</tbody></table>`;
        }

        function updateCounts() { /* Logic for sidebar numbers */ }
        function setView(view, el) { 
            CURRENT_VIEW = view; 
            document.getElementById('view-title').innerText = view;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            instantSearch(); 
        }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
