<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #111827; --ecs-border: #E5E7EB; --ecs-bg: #F9FAFB; --sidebar-width: 260px; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--ecs-bg); color: var(--ecs-dark); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* FAST Branded Login */
        #login-screen { text-align: center; padding-top: 15vh; height: 100vh; background: var(--ecs-bg); }
        .login-brand { font-family: 'Montserrat', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 8px; font-size: 3.5rem; color: #000; margin-bottom: 30px; }
        .login-brand span { color: var(--ecs-orange); }
        .login-card { width: 360px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 14px; }
        #login-btn { width: 100%; padding: 16px; background: var(--ecs-orange); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; text-transform: uppercase; }

        /* Sidebar & Navigation */
        #dashboard { display: flex; height: 100vh; }
        #sidebar { width: var(--sidebar-width); background: #1F2937; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #374151; }
        .sidebar-logo-small { font-family: 'Montserrat', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; font-size: 1.1rem; }
        .sidebar-logo-small span { color: var(--ecs-orange); }
        .nav-label { font-size: 9px; color: #6B7280; padding: 20px 20px 5px 20px; text-transform: uppercase; font-weight: 600; }
        .nav-item { padding: 10px 20px; cursor: pointer; font-size: 12px; color: #9CA3AF; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid transparent; transition: 0.2s; }
        .nav-item.active { background: #111827; color: white; border-left: 4px solid var(--ecs-orange); font-weight: 600; }
        .nav-count { font-size: 9px; background: #374151; color: #9CA3AF; padding: 1px 6px; border-radius: 10px; }

        /* Main Content */
        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
        header { background: white; padding: 0 20px; height: 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ecs-border); }
        .controls-area { padding: 10px 20px; border-bottom: 1px solid var(--ecs-border); display: flex; align-items: center; gap: 10px; background: #fff; }
        #searchBar { flex: 1; padding: 8px 18px; border: 1px solid var(--ecs-border); border-radius: 50px; outline: none; background: #f3f4f6; font-size: 13px; }
        
        /* Column Menu UI */
        #col-toggle-btn { background: white; border: 1px solid var(--ecs-border); padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        #col-toggle-btn:hover { background: #f9fafb; }
        
        /* Modal Overlay */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-card { background: white; width: 340px; max-height: 80vh; border-radius: 10px; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-header { padding: 15px; border-bottom: 1px solid var(--ecs-border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 10px 15px; overflow-y: auto; }
        .modal-footer { padding: 12px 15px; border-top: 1px solid var(--ecs-border); display: flex; justify-content: flex-end; }
        
        /* Draggable List Items */
        .col-item { display: flex; align-items: center; padding: 8px 10px; background: white; border: 1px solid var(--ecs-border); margin-bottom: 4px; border-radius: 6px; cursor: grab; user-select: none; }
        .col-item input { width: auto; margin: 0 10px 0 0; }
        .drag-handle { margin-left: auto; color: #9CA3AF; font-size: 16px; }

        /* Tightened Table Layout */
        .table-wrapper { flex: 1; overflow: auto; margin: 15px; border: 1px solid var(--ecs-border); border-radius: 6px; }
        table { border-collapse: separate; border-spacing: 0; font-size: 11px; width: 100%; table-layout: fixed; }
        th { background: #F9FAFB; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--ecs-border); border-right: 1px solid #eee; text-align: left; padding: 8px 12px; color: #4B5563; text-transform: uppercase; font-weight: 700; letter-spacing: 0.02em; }
        td { padding: 6px 12px; border-bottom: 1px solid #f3f4f6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-right: 1px solid #fcfcfc; color: #374151; line-height: 1.4; }
        tr:hover td { background-color: #FFFBF7; }
        
        /* Dynamic Column Widths */
        th:nth-child(1), td:nth-child(1) { width: 80px; } /* File Number */
        th:nth-child(3), td:nth-child(3) { width: 140px; } /* Status */
        th:nth-child(6), td:nth-child(6) { width: 90px; text-align: right; } /* Total Invoice */
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-brand">F<span>A</span>ST</div>
        <div class="login-card">
            <input type="text" id="u" placeholder="Email Address">
            <input type="password" id="p" placeholder="Password">
            <button onclick="handleLogin()" id="login-btn">Sign In</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav id="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo-small">F<span>A</span>ST</div></div>
            <div class="nav-label">Status Views</div>
            <div class="nav-item active" onclick="setView('All Jobs', this)"><span>All Jobs</span><span class="nav-count" id="cnt-all">-</span></div>
            <div class="nav-item" onclick="setView('Completed Jobs', this)"><span>Completed Jobs</span><span class="nav-count" id="cnt-comp">-</span></div>
            <div class="nav-item" onclick="setView('Completed Job - Factored', this)"><span>Completed Factored</span><span class="nav-count" id="cnt-fact">-</span></div>
            <div class="nav-item" onclick="setView('Testing Only Invoicing', this)"><span>Testing Invoicing</span><span class="nav-count" id="cnt-test">-</span></div>
            <div class="nav-item" onclick="setView('Project Awaiting Approval', this)"><span>Awaiting Approval</span><span class="nav-count" id="cnt-awat">-</span></div>
            <div style="margin-top:auto; padding:15px;"><button onclick="logout()" style="width:100%; background:none; border:1px solid #4B5563; color:#9CA3AF; padding:8px; border-radius:6px; cursor:pointer; font-size: 11px;">Logout</button></div>
        </nav>

        <main id="main-content">
            <header><h2 id="view-title" style="margin:0; font-size:1rem; font-weight: 600;">All Jobs</h2><div id="sync-status" style="font-size:10px; color:#9CA3AF;">Syncing...</div></header>
            <div class="controls-area">
                <input type="text" id="searchBar" oninput="renderTable()" placeholder="Quick Search...">
                <button id="col-toggle-btn" onclick="toggleColModal()">
                    <span>⚙</span> Columns
                </button>
            </div>
            <div class="table-wrapper" id="table-output"></div>
        </main>
    </div>

    <div id="col-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <div style="font-weight: 600; font-size: 14px;">Edit Columns</div>
                <div style="display:flex; align-items: center; gap: 10px;">
                    <label style="font-size:11px; cursor:pointer; color: var(--ecs-orange); font-weight: 600;">
                        <input type="checkbox" id="master-col-check" onclick="toggleAllCols(this.checked)"> All
                    </label>
                    <button onclick="toggleColModal()" style="background:none; border:none; font-size:20px; cursor:pointer; color:#9CA3AF;">&times;</button>
                </div>
            </div>
            <div class="modal-body" id="col-list-container"></div>
            <div class="modal-footer">
                <button onclick="saveColumnConfig()" style="background: var(--ecs-orange); color:white; border:none; padding:8px 16px; border-radius:4px; cursor:pointer; font-size: 12px; font-weight:600;">Save View</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw03qwvQXRxh1fzuiGTrngVraBGETG-OVFS81dww9Mboe21Ddk3htTGqDJy3xLeHvMpbQ/exec";
        
        let UI_CACHE = JSON.parse(localStorage.getItem('fast_data_cache') || "[]");
        let ROW_HASHES = JSON.parse(localStorage.getItem('fast_hash_cache') || "{}");
        let HEADERS = JSON.parse(localStorage.getItem('fast_headers_cache') || "[]");
        let CURRENT_VIEW = 'All Jobs';
        
        const DEFAULT_COLS = ["File Number", "File Name", "Status", "Customer Name", "Insurance Company", "Total Invoice"];
        let ACTIVE_COLS = JSON.parse(localStorage.getItem('fast_active_cols')) || [...DEFAULT_COLS];

        window.onload = () => { if (localStorage.getItem("fast_active") === "true") showDashboard(); };

        async function handleLogin() {
            const u = document.getElementById('u').value.trim(), p = document.getElementById('p').value.trim();
            if(!u || !p) return;
            document.getElementById('login-btn').innerText = "Authenticating...";
            try {
                const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`, { method: 'GET', redirect: 'follow' });
                const data = await res.json();
                if(data.result === "success") { localStorage.setItem("fast_active", "true"); showDashboard(); } 
                else { alert(data.reason || "Denied"); document.getElementById('login-btn').innerText = "Sign In"; }
            } catch (e) { alert("Server connection error."); }
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            if(UI_CACHE.length > 0) { renderTable(); updateCounts(); }
            performSurgicalSync();
            setInterval(performSurgicalSync, 30000);
        }

        async function performSurgicalSync() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=sync_surgical&hashes=${encodeURIComponent(JSON.stringify(ROW_HASHES))}`, { method: 'GET', redirect: 'follow' });
                const json = await res.json();
                if (json.result === "success") {
                    HEADERS = json.headers;
                    localStorage.setItem('fast_headers_cache', JSON.stringify(HEADERS));
                    if (json.updates && json.updates.length > 0) {
                        const fIdx = HEADERS.indexOf("File Number");
                        json.updates.forEach(up => {
                            const exIdx = UI_CACHE.findIndex(r => String(r[fIdx]) === String(up.id));
                            if(exIdx !== -1) UI_CACHE[exIdx] = up.data; else UI_CACHE.unshift(up.data);
                            ROW_HASHES[up.id] = up.hash;
                        });
                        localStorage.setItem('fast_data_cache', JSON.stringify(UI_CACHE));
                        localStorage.setItem('fast_hash_cache', JSON.stringify(ROW_HASHES));
                        renderTable();
                        updateCounts();
                    }
                    document.getElementById('sync-status').innerText = "✓ " + UI_CACHE.length + " Jobs";
                }
            } catch (e) { document.getElementById('sync-status').innerText = "⚠ Sync Error"; }
        }

        function toggleColModal() {
            const modal = document.getElementById('col-modal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) initColList();
        }

        function initColList() {
            const container = document.getElementById('col-list-container');
            container.innerHTML = '';
            const allPossible = HEADERS.length > 0 ? [...HEADERS] : [...DEFAULT_COLS];
            const displayOrder = [...ACTIVE_COLS];
            allPossible.forEach(h => { if(!displayOrder.includes(h)) displayOrder.push(h); });

            displayOrder.forEach(col => {
                const div = document.createElement('div');
                div.className = 'col-item';
                div.dataset.id = col;
                const isChecked = ACTIVE_COLS.includes(col) ? 'checked' : '';
                div.innerHTML = `<input type="checkbox" class="col-check" ${isChecked}><span style="font-size:12px;">${col}</span><span class="drag-handle">⠿</span>`;
                container.appendChild(div);
            });
            new Sortable(container, { animation: 150, handle: '.drag-handle', ghostClass: 'sortable-ghost' });
        }

        function toggleAllCols(checked) {
            document.querySelectorAll('.col-check').forEach(cb => cb.checked = checked);
        }

        function saveColumnConfig() {
            const newActive = [];
            document.querySelectorAll('.col-item').forEach(item => {
                if(item.querySelector('.col-check').checked) newActive.push(item.dataset.id);
            });
            if(newActive.length === 0) return;
            ACTIVE_COLS = newActive;
            localStorage.setItem('fast_active_cols', JSON.stringify(ACTIVE_COLS));
            renderTable();
            toggleColModal();
        }

        function renderTable() {
            if (!HEADERS.length) return;
            const sIdx = HEADERS.indexOf("Status");
            const q = document.getElementById("searchBar").value.toUpperCase();
            let filtered = UI_CACHE.filter(r => (CURRENT_VIEW === 'All Jobs' || String(r[sIdx]) === CURRENT_VIEW) && r.join(" ").toUpperCase().includes(q));

            let html = `<table><thead><tr>`;
            ACTIVE_COLS.forEach(c => html += `<th>${c}</th>`);
            html += `</tr></thead><tbody>`;
            filtered.forEach(r => {
                html += `<tr>`;
                ACTIVE_COLS.forEach(c => {
                    const idx = HEADERS.indexOf(c);
                    const val = idx !== -1 ? (r[idx] || '') : '';
                    html += `<td title="${val}">${val}</td>`;
                });
                html += `</tr>`;
            });
            document.getElementById('table-output').innerHTML = html + `</tbody></table>`;
        }

        function updateCounts() {
            const sIdx = HEADERS.indexOf("Status"); if(sIdx === -1) return;
            const c = { all: UI_CACHE.length, comp: 0, fact: 0, test: 0, awat: 0 };
            UI_CACHE.forEach(r => {
                const s = String(r[sIdx]);
                if(s === "Completed Jobs") c.comp++;
                else if(s === "Completed Job - Factored") c.fact++;
                else if(s === "Testing Only Invoicing") c.test++;
                else if(s === "Project Awaiting Approval") c.awat++;
            });
            document.getElementById('cnt-all').innerText = c.all;
            document.getElementById('cnt-comp').innerText = c.comp;
            document.getElementById('cnt-fact').innerText = c.fact;
            document.getElementById('cnt-test').innerText = c.test;
            document.getElementById('cnt-awat').innerText = c.awat;
        }

        function setView(v, el) { 
            CURRENT_VIEW = v; 
            document.getElementById('view-title').innerText = v;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            renderTable(); 
        }
        
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
