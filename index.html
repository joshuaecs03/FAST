<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #111827; --ecs-border: #E5E7EB; --ecs-bg: #F9FAFB; --sidebar-width: 280px; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--ecs-bg); color: var(--ecs-dark); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* Login Interface */
        #login-screen { text-align: center; padding-top: 15vh; height: 100vh; background: var(--ecs-bg); }
        .login-brand { font-family: 'Montserrat', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 8px; font-size: 3.5rem; color: #000; margin-bottom: 30px; }
        .login-brand span { color: var(--ecs-orange); }
        .login-card { width: 360px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 14px; }

        /* Sidebar & Navigation */
        #dashboard { display: flex; height: 100vh; }
        #sidebar { width: var(--sidebar-width); background: #1F2937; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid #374151; }
        .sidebar-logo-small { font-family: 'Montserrat', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; font-size: 1.2rem; }
        .sidebar-logo-small span { color: var(--ecs-orange); }
        
        .nav-label { font-size: 10px; color: #6B7280; padding: 25px 25px 5px 25px; text-transform: uppercase; font-weight: 600; }
        .nav-item { padding: 12px 25px; cursor: pointer; font-size: 13px; color: #9CA3AF; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid transparent; transition: 0.2s; }
        .nav-item:hover { background: #2D3748; color: white; }
        .nav-item.active { background: #111827; color: white; border-left: 4px solid var(--ecs-orange); font-weight: 600; }
        .nav-count { font-size: 10px; background: #374151; color: #9CA3AF; padding: 2px 8px; border-radius: 10px; }

        /* Main Content Area */
        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
        header { background: white; padding: 0 30px; height: 70px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ecs-border); }
        
        .controls-area { padding: 12px 30px; border-bottom: 1px solid var(--ecs-border); display: flex; align-items: center; gap: 15px; background: #fff; }
        #searchBar { flex: 1; padding: 10px 20px; border: 1px solid var(--ecs-border); border-radius: 50px; outline: none; font-size: 14px; background: #f3f4f6; }
        
        /* Clean Column Manager */
        .col-manager { position: relative; }
        #col-btn { background: white; border: 1px solid var(--ecs-border); padding: 8px 18px; border-radius: 50px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; }
        #col-btn:hover { background: #f9f9f9; border-color: #d1d5db; }
        
        .col-dropdown { 
            position: absolute; right: 0; top: 120%; background: white; 
            border: 1px solid var(--ecs-border); border-radius: 12px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); z-index: 1000; 
            width: 320px; padding: 0; overflow: hidden; display: flex; flex-direction: column;
        }
        .col-dropdown-header { padding: 15px; border-bottom: 1px solid #eee; background: #fbfbfb; }
        .col-search { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; margin-bottom: 10px; box-sizing: border-box; }
        .col-actions { display: flex; gap: 5px; }
        .col-actions button { flex: 1; font-size: 10px; padding: 6px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: white; font-weight: 500; }
        .col-actions button:hover { background: #f3f4f6; }

        .col-list-scroll { max-height: 350px; overflow-y: auto; padding: 10px 0; }
        .col-item { display: flex; align-items: center; gap: 12px; padding: 8px 20px; font-size: 13px; cursor: grab; transition: 0.1s; }
        .col-item:hover { background: #f8fafc; }
        .col-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--ecs-orange); }
        .col-item span { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #4b5563; }

        /* Table */
        .table-wrapper { flex: 1; overflow: auto; margin: 20px; border: 1px solid var(--ecs-border); border-radius: 8px; }
        table { border-collapse: separate; border-spacing: 0; font-size: 11px; width: max-content; min-width: 100%; table-layout: fixed; }
        th { background: #F9FAFB; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--ecs-border); border-right: 1px solid #eee; text-align: left; padding: 14px; color: #6B7280; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
        td { padding: 12px 14px; border-bottom: 1px solid var(--ecs-border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-right: 1px solid #f9f9f9; color: #374151; }
        tr:hover td { background-color: #FFF9F5; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-brand">F<span>A</span>ST</div>
        <div class="login-card">
            <input type="text" id="u" placeholder="Email Address">
            <input type="password" id="p" placeholder="Password">
            <button onclick="handleLogin()" style="width:100%; padding:16px; background:var(--ecs-orange); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:700;">Sign In</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav id="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo-small">F<span>A</span>ST</div></div>
            <div class="nav-label">Status Views</div>
            <div class="nav-item active" onclick="setView('All Jobs', this)"><span>All Jobs</span><span class="nav-count" id="cnt-all">-</span></div>
            <div class="nav-item" onclick="setView('Completed Jobs', this)"><span>Completed Jobs</span><span class="nav-count" id="cnt-comp">-</span></div>
            <div class="nav-item" onclick="setView('Completed Job Factored', this)"><span>Completed Factored</span><span class="nav-count" id="cnt-fact">-</span></div>
            <div class="nav-item" onclick="setView('Testing Only Invoicing', this)"><span>Testing Invoicing</span><span class="nav-count" id="cnt-test">-</span></div>
            <div class="nav-item" onclick="setView('Project Awaiting Approval', this)"><span>Project Awaiting Approval</span><span class="nav-count" id="cnt-awat">-</span></div>
            
            <div style="margin-top:auto; padding:20px; border-top:1px solid #374151;">
                <button onclick="logout()" style="width:100%; background:none; border:1px solid #4B5563; color:#9CA3AF; padding:10px; cursor:pointer; border-radius:6px; font-size: 12px;">Logout</button>
            </div>
        </nav>

        <main id="main-content">
            <header><h2 id="view-title" style="margin:0; font-size:1.1rem; font-weight: 600;">All Jobs</h2><div id="sync-status" style="font-size:11px; color:#9CA3AF;">Connecting...</div></header>
            
            <div class="controls-area">
                <input type="text" id="searchBar" oninput="renderTable()" placeholder="Search through all columns...">
                <div class="col-manager">
                    <button id="col-btn" onclick="toggleColMenu()">⚙ Columns</button>
                    <div id="col-dropdown" class="col-dropdown hidden">
                        <div class="col-dropdown-header">
                            <input type="text" id="colSearch" class="col-search" oninput="filterColMenu()" placeholder="Filter columns...">
                            <div class="col-actions">
                                <button onclick="selectAllCols(true)">Show All</button>
                                <button onclick="selectAllCols(false)">Clear</button>
                                <button onclick="resetDefaults()">Reset</button>
                            </div>
                        </div>
                        <div id="col-list" class="col-list-scroll"></div>
                    </div>
                </div>
            </div>

            <div class="table-wrapper"><div id="table-output"></div></div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzp0O_jrTZlavVyXAUGkizEeGstozVKca1VWdeqns-gIVixo5ZLWa65YD546vUkU7nmQ/exec";
        
        let UI_CACHE = JSON.parse(localStorage.getItem('fast_data_cache') || "[]");
        let ROW_HASHES = JSON.parse(localStorage.getItem('fast_hash_cache') || "{}");
        let HEADERS = JSON.parse(localStorage.getItem('fast_headers_cache') || "[]");
        let COLUMN_DEFS = [], CURRENT_VIEW = 'All Jobs';

        // Exact naming convention from your Xcelerate headers
        const DEFAULT_COLS = ["File Number", "File Name", "Status", "Customer Name", "Loss Address", "Insurance Company", "Total Invoice"];

        window.onload = () => { if (localStorage.getItem("fast_active") === "true") showDashboard(); };

        async function handleLogin() {
            const u = document.getElementById('u').value.trim(), p = document.getElementById('p').value.trim();
            if(!u || !p) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`, { method: 'GET', mode: 'cors', redirect: 'follow' });
                const data = await res.json();
                if(data.result === "success") { localStorage.setItem("fast_active", "true"); showDashboard(); } 
                else { alert(data.reason); }
            } catch (e) { alert("Login error."); }
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            if(UI_CACHE.length > 0) { loadColumnSettings(); renderTable(); renderColMenu(); updateCounts(); }
            performSurgicalSync();
            setInterval(performSurgicalSync, 30000);
            initSortable();
        }

        async function performSurgicalSync() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=sync_surgical&hashes=${encodeURIComponent(JSON.stringify(ROW_HASHES))}`, { method: 'GET', mode: 'cors', redirect: 'follow' });
                const json = await res.json();
                if (json.result === "success") {
                    HEADERS = json.headers;
                    localStorage.setItem('fast_headers_cache', JSON.stringify(HEADERS));
                    if (COLUMN_DEFS.length === 0) { loadColumnSettings(); renderColMenu(); }
                    if (json.updates.length > 0) {
                        const fIdx = HEADERS.indexOf("File Number");
                        json.updates.forEach(up => {
                            const fId = fIdx !== -1 ? String(up.data[fIdx]) : "row-" + Math.random();
                            const exIdx = UI_CACHE.findIndex(r => String(r[fIdx]) === fId);
                            if(exIdx !== -1) UI_CACHE[exIdx] = up.data; else UI_CACHE.unshift(up.data);
                            ROW_HASHES[fId] = up.hash;
                        });
                        localStorage.setItem('fast_data_cache', JSON.stringify(UI_CACHE));
                        localStorage.setItem('fast_hash_cache', JSON.stringify(ROW_HASHES));
                        renderTable();
                        updateCounts();
                    }
                    document.getElementById('sync-status').innerText = "✓ Connected | " + new Date().toLocaleTimeString();
                }
            } catch (e) { document.getElementById('sync-status').innerText = "⚠ Sync Error"; }
        }

        function loadColumnSettings() {
            const saved = localStorage.getItem('fast_col_layout');
            if (saved) {
                COLUMN_DEFS = JSON.parse(saved).filter(c => HEADERS.includes(c.name));
                HEADERS.forEach(h => { if (!COLUMN_DEFS.find(c => c.name === h)) COLUMN_DEFS.push({ name: h, visible: false, width: 160 }); });
            } else {
                COLUMN_DEFS = HEADERS.map(h => ({ name: h, visible: DEFAULT_COLS.includes(h), width: 160 }));
            }
        }

        function renderTable() {
            const visible = COLUMN_DEFS.filter(d => d.visible);
            const sIdx = HEADERS.indexOf("Status");
            const q = document.getElementById("searchBar").value.toUpperCase();
            let filtered = UI_CACHE.filter(r => (CURRENT_VIEW === 'All Jobs' || r[sIdx] === CURRENT_VIEW) && r.join(" ").toUpperCase().includes(q));

            let html = `<table><thead><tr>`;
            visible.forEach(def => html += `<th style="width:${def.width}px">${def.name}</th>`);
            html += `</tr></thead><tbody>`;
            filtered.forEach(r => {
                html += `<tr>`;
                visible.forEach(def => html += `<td>${r[HEADERS.indexOf(def.name)] || ''}</td>`);
                html += `</tr>`;
            });
            document.getElementById('table-output').innerHTML = html + `</tbody></table>`;
        }

        function toggleColMenu() { 
            const menu = document.getElementById('col-dropdown');
            menu.classList.toggle('hidden');
            if(!menu.classList.contains('hidden')) document.getElementById('colSearch').focus();
        }

        function filterColMenu() {
            const q = document.getElementById('colSearch').value.toLowerCase();
            document.querySelectorAll('.col-item').forEach(item => {
                const text = item.querySelector('span').innerText.toLowerCase();
                item.style.display = text.includes(q) ? 'flex' : 'none';
            });
        }

        function renderColMenu() {
            let html = '';
            COLUMN_DEFS.forEach((def, i) => {
                html += `<div class="col-item" data-name="${def.name}">
                    <input type="checkbox" ${def.visible ? 'checked' : ''} onchange="toggleVis('${def.name}')">
                    <span>${def.name}</span>
                </div>`;
            });
            document.getElementById('col-list').innerHTML = html;
        }

        function toggleVis(name) { 
            const def = COLUMN_DEFS.find(d => d.name === name);
            def.visible = !def.visible; 
            save(); renderTable(); 
        }
        
        function selectAllCols(s) { COLUMN_DEFS.forEach(c => c.visible = s); save(); renderTable(); renderColMenu(); }
        function resetDefaults() { COLUMN_DEFS.forEach(c => c.visible = DEFAULT_COLS.includes(c.name)); save(); renderTable(); renderColMenu(); }
        function save() { localStorage.setItem('fast_col_layout', JSON.stringify(COLUMN_DEFS)); }
        
        function initSortable() {
            new Sortable(document.getElementById('col-list'), {
                animation: 150,
                onEnd: (evt) => {
                    const list = Array.from(document.querySelectorAll('.col-item')).map(i => i.getAttribute('data-name'));
                    const newOrder = [];
                    list.forEach(name => { newOrder.push(COLUMN_DEFS.find(d => d.name === name)); });
                    COLUMN_DEFS = newOrder;
                    save(); renderTable();
                }
            });
        }

        function updateCounts() {
            const sIdx = HEADERS.indexOf("Status");
            if(sIdx === -1) return;
            const c = { all: UI_CACHE.length, comp: 0, fact: 0, test: 0, awat: 0 };
            UI_CACHE.forEach(r => {
                const s = r[sIdx];
                if(s === "Completed") c.comp++;
                else if(s === "Completed Job Factored") c.fact++;
                else if(s === "Testing Only Invoicing") c.test++;
                else if(s === "Project awaiting approval") c.awat++;
            });
            document.getElementById('cnt-all').innerText = c.all;
            document.getElementById('cnt-comp').innerText = c.comp;
            document.getElementById('cnt-fact').innerText = c.fact;
            document.getElementById('cnt-test').innerText = c.test;
            document.getElementById('cnt-awat').innerText = c.awat;
        }

        function setView(v, el) { 
            CURRENT_VIEW = v; 
            document.getElementById('view-title').innerText = v;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            renderTable(); 
        }

        function logout() { localStorage.clear(); location.reload(); }
        
        // Close menu on click outside
        window.addEventListener('click', (e) => {
            if (!e.target.closest('.col-manager')) document.getElementById('col-dropdown').classList.add('hidden');
        });
    </script>
</body>
</html>
