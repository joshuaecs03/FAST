<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #111827; --ecs-border: #E5E7EB; --ecs-bg: #F9FAFB; --sidebar-width: 280px; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--ecs-bg); color: var(--ecs-dark); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        #dashboard { display: flex; height: 100vh; }
        #sidebar { width: var(--sidebar-width); background: #1F2937; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 30px; border-bottom: 1px solid #374151; }
        .sidebar-logo { font-family: 'Montserrat', sans-serif; color: white; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; font-size: 1.6rem; }
        .sidebar-logo span { color: var(--ecs-orange); }

        .nav-label { font-size: 10px; color: #6B7280; padding: 25px 30px 5px 30px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .nav-item { padding: 16px 30px; cursor: pointer; font-size: 13px; color: #9CA3AF; transition: 0.2s; border-left: 4px solid transparent; display: flex; align-items: center; justify-content: space-between; }
        .nav-item:hover { background: #374151; color: white; }
        .nav-item.active { background: #111827; color: white; border-left: 4px solid var(--ecs-orange); font-weight: 600; }
        .nav-count { font-size: 10px; background: #374151; color: #9CA3AF; padding: 2px 8px; border-radius: 10px; }

        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
        header { background: white; padding: 0 30px; height: 70px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ecs-border); }
        .search-area { padding: 20px 30px; border-bottom: 1px solid var(--ecs-border); }
        #searchBar { width: 100%; padding: 14px 20px; border: 1px solid var(--ecs-border); border-radius: 50px; outline: none; box-sizing: border-box; font-size: 14px; }

        .table-wrapper { flex: 1; overflow: auto; margin: 20px; border: 1px solid var(--ecs-border); border-radius: 8px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12px; }
        th { background: #F9FAFB; padding: 16px; position: sticky; top: 0; text-align: left; font-size: 10px; color: #6B7280; text-transform: uppercase; border-bottom: 1px solid var(--ecs-border); z-index: 10; font-weight: 600; }
        td { padding: 12px 16px; border-bottom: 1px solid var(--ecs-border); white-space: nowrap; color: #374151; }
        tr:hover td { background-color: #FFF9F5; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="text-align:center; padding-top:15vh;">
            <div class="sidebar-logo" style="color:black; font-size:3.5rem; letter-spacing:8px;">F<span>A</span>ST</div>
            <div style="width:320px; margin:40px auto; background:white; padding:40px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.05);">
                <input type="text" id="u" placeholder="Email Address" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px;">
                <input type="password" id="p" placeholder="Password" style="width:100%; padding:12px; margin-bottom:25px; border:1px solid #ddd; border-radius:8px;">
                <button onclick="handleLogin()" style="width:100%; padding:14px; background:var(--ecs-orange); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600; text-transform:uppercase;">Sign In</button>
                <p id="loginStatus" style="color:#EF4444; font-size:12px; margin-top:15px;"></p>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav id="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo">F<span>A</span>ST</div></div>
            <div class="nav-label">Status Views</div>
            <div class="nav-item active" onclick="setView('All Jobs', this)"><span>All Jobs</span><span class="nav-count" id="count-all">-</span></div>
            <div class="nav-item" onclick="setView('Completed Jobs', this)"><span>Completed</span><span class="nav-count" id="count-comp">-</span></div>
            <div class="nav-item" onclick="setView('Project Awaiting Approval', this)"><span>Awaiting Approval</span><span class="nav-count" id="count-awat">-</span></div>
            <div class="nav-item" onclick="setView('Testing Only Invoicing', this)"><span>Testing Invoicing</span><span class="nav-count" id="count-test">-</span></div>
            <div class="nav-item" onclick="setView('Completed Job - Factored', this)"><span>Completed & Factored</span><span class="nav-count" id="count-fact">-</span></div>
            
            <div style="margin-top:auto; padding:20px; border-top:1px solid #374151;">
                <button onclick="logout()" style="width:100%; background:none; border:1px solid #4B5563; color:#9CA3AF; padding:10px; border-radius:6px; cursor:pointer; font-size:11px;">Sign Out</button>
            </div>
        </nav>
        <main id="main-content">
            <header>
                <h2 id="view-title" style="margin:0; font-weight:600;">All Jobs</h2>
                <div id="sync-status" style="font-size:11px; color:#9CA3AF;">Connecting...</div>
            </header>
            <div class="search-area">
                <input type="text" id="searchBar" oninput="instantSearch()" placeholder="Filter by File #, Name, or Address...">
            </div>
            <div class="table-wrapper">
                <div id="table-output"></div>
            </div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoO-wu2p2j463ePFB5kW59yv45-hxBo7gV8EK0hqbV5t5q1MVn2K8nvWIOFmk4Q0OxSA/exec";
        let UI_CACHE = [], SHADOW_BUFFER = [], HEADERS = [], ROW_HASHES = {};
        let CURRENT_VIEW = 'All Jobs';

        window.onload = () => { if (localStorage.getItem("fast_active") === "true") init(); };

        async function handleLogin() {
            const u = document.getElementById('u').value, p = document.getElementById('p').value;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`);
                const data = await res.json();
                if(data.result === "success") {
                    localStorage.setItem("fast_active", "true");
                    init();
                } else {
                    document.getElementById('loginStatus').innerText = "Invalid credentials. Please try again.";
                }
            } catch (e) { document.getElementById('loginStatus').innerText = "Connection error."; }
        }

        async function init() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            await performBackgroundSync();
            setInterval(performBackgroundSync, 30000); // 30-second surgical sync
        }

        async function performBackgroundSync() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=sync_surgical&hashes=${encodeURIComponent(JSON.stringify(ROW_HASHES))}`);
                const json = await res.json();

                if (json.result === "busy") {
                    document.getElementById('sync-status').innerText = "⚠ Update in progress (Standby)";
                    return;
                }

                if (json.updates && json.updates.length > 0) {
                    HEADERS = json.headers;
                    const fileNumIdx = HEADERS.indexOf("File Number");
                    
                    // Create working copy in the Shadow Buffer
                    SHADOW_BUFFER = [...UI_CACHE];
                    
                    json.updates.forEach(update => {
                        const fileNum = update.data[fileNumIdx];
                        const existingIdx = SHADOW_BUFFER.findIndex(r => r[fileNumIdx] === fileNum);
                        
                        if (existingIdx !== -1) {
                            SHADOW_BUFFER[existingIdx] = update.data;
                        } else {
                            SHADOW_BUFFER.unshift(update.data);
                        }
                        ROW_HASHES[fileNum] = update.hash;
                    });

                    // Atomic Swap: Update UI only if user isn't actively searching
                    const isUserActive = document.getElementById('searchBar').value.length > 0;
                    if (!isUserActive) {
                        UI_CACHE = [...SHADOW_BUFFER];
                        instantSearch();
                        updateCounts();
                    }
                }
                document.getElementById('sync-status').innerText = "✓ System Ready: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            } catch (e) { document.getElementById('sync-status').innerText = "⚠ Reconnecting..."; }
        }

        function instantSearch() {
            const q = document.getElementById("searchBar").value.toUpperCase();
            const statusIdx = HEADERS.indexOf("Status");
            const filtered = UI_CACHE.filter(row => {
                const matchesView = (CURRENT_VIEW === 'All Jobs' || row[statusIdx] === CURRENT_VIEW);
                return matchesView && row.join(" ").toUpperCase().includes(q);
            }).slice(0, 100);
            render(filtered);
        }

        function render(rows) {
            const out = document.getElementById('table-output');
            if (!rows.length) {
                out.innerHTML = '<div style="text-align:center; padding:100px; color:#9CA3AF;">No matching records found.</div>';
                return;
            }
            let html = `<table><thead><tr>`;
            HEADERS.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            rows.forEach(r => {
                html += `<tr>`;
                r.forEach(cell => html += `<td>${cell || ''}</td>`);
                html += `</tr>`;
            });
            out.innerHTML = html + `</tbody></table>`;
        }

        function updateCounts() {
            const statusIdx = HEADERS.indexOf("Status");
            if (statusIdx === -1) return;
            const counts = { all: UI_CACHE.length, comp: 0, awat: 0, test: 0, fact: 0 };
            UI_CACHE.forEach(row => {
                const s = row[statusIdx];
                if (s === 'Completed Jobs') counts.comp++;
                else if (s === 'Project Awaiting Approval') counts.awat++;
                else if (s === 'Testing Only Invoicing') counts.test++;
                else if (s === 'Completed Job - Factored') counts.fact++;
            });
            document.getElementById('count-all').innerText = counts.all;
            document.getElementById('count-comp').innerText = counts.comp;
            document.getElementById('count-awat').innerText = counts.awat;
            document.getElementById('count-test').innerText = counts.test;
            document.getElementById('count-fact').innerText = counts.fact;
        }

        function setView(view, el) { 
            CURRENT_VIEW = view; 
            document.getElementById('view-title').innerText = view;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            instantSearch(); 
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
