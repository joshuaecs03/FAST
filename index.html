<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST Portal</title>
    <style>
        :root { --primary: #1a2a6c; --accent: #b21f1f; --bg: #f5f7fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; }
        .hidden { display: none !important; }
        
        /* Login Styles */
        #login-container { flex: 1; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .login-card h1 { color: var(--primary); margin-bottom: 0.5rem; font-size: 2rem; letter-spacing: 2px; }
        .login-card p { color: #666; margin-bottom: 1.5rem; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 10px; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        #msg { margin-top: 1rem; font-size: 0.85rem; min-height: 1.2rem; }

        /* Dashboard Styles */
        header { background: var(--primary); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 20px; overflow: auto; flex: 1; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; font-size: 0.85rem; white-space: nowrap; }
        th { background: #f8f9fa; font-weight: 600; position: sticky; top: 0; }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-card">
            <h1>FAST</h1>
            <p>Field Analysis & Storage Tracking</p>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button id="loginBtn" onclick="handleLogin()">LOGIN</button>
            <div id="msg"></div>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <header>
            <div style="font-weight: bold; font-size: 1.4rem;">FAST PORTAL</div>
            <button onclick="location.reload()" style="width: auto; padding: 5px 15px; background: var(--accent);">LOGOUT</button>
        </header>
        <div class="content">
            <div id="table-wrapper">
                <p>Loading Xcelerate Data...</p>
            </div>
        </div>
    </div>

    <script>
        // Replace with your actual Google Web App URL (ending in /exec)
        const SCRIPT_URL = "PASTE_YOUR_FULL_URL_HERE";

        async function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('loginBtn');

            if(!u || !p) {
                msg.style.color = "orange";
                msg.innerText = "Please enter credentials.";
                return;
            }

            msg.style.color = "blue";
            msg.innerText = "Authenticating with FAST Backend...";
            btn.disabled = true;

            try {
                // Use the standard fetch with parameters
                const response = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`);
                const data = await response.json();

                if(data.result === "success") {
                    document.getElementById('login-container').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    loadData();
                } else {
                    msg.style.color = "red";
                    msg.innerText = "Error: " + data.message;
                    btn.disabled = false;
                }
            } catch (error) {
                msg.style.color = "red";
                msg.innerText = "Network Error. Check your Script URL.";
                console.error(error);
                btn.disabled = false;
            }
        }

        async function loadData() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getData`);
                const data = await res.json();
                
                if (!data || data.length === 0) {
                    document.getElementById('table-wrapper').innerHTML = "No data found in Xcelerate Data tab.";
                    return;
                }

                let html = `<table><thead><tr>`;
                Object.keys(data[0]).forEach(key => html += `<th>${key}</th>`);
                html += `</tr></thead><tbody>`;
                
                data.forEach(row => {
                    html += `<tr>`;
                    Object.values(row).forEach(val => html += `<td>${val || ''}</td>`);
                    html += `</tr>`;
                });
                html += `</tbody></table>`;
                document.getElementById('table-wrapper').innerHTML = html;
            } catch (e) {
                document.getElementById('table-wrapper').innerHTML = "Failed to load spreadsheet data.";
            }
        }
    </script>
</body>
</html>
