<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #111827; --ecs-border: #E5E7EB; --ecs-bg: #F9FAFB; --sidebar-width: 260px; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--ecs-bg); color: var(--ecs-dark); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        #login-screen { text-align: center; padding-top: 15vh; height: 100vh; background: var(--ecs-bg); }
        .login-card { width: 340px; margin: 40px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .sidebar-logo { font-family: 'Montserrat', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; font-size: 2rem; color: black; }
        .sidebar-logo span { color: var(--ecs-orange); }

        #dashboard { display: flex; height: 100vh; }
        #sidebar { width: var(--sidebar-width); background: #1F2937; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid #374151; }
        .nav-label { font-size: 10px; color: #6B7280; padding: 20px 25px 5px 25px; text-transform: uppercase; font-weight: 600; }
        .nav-item { padding: 14px 25px; cursor: pointer; font-size: 13px; color: #9CA3AF; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid transparent; }
        .nav-item.active { background: #111827; color: white; border-left: 4px solid var(--ecs-orange); font-weight: 600; }

        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
        header { background: white; padding: 0 30px; height: 65px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ecs-border); }
        .controls-area { padding: 12px 30px; border-bottom: 1px solid var(--ecs-border); display: flex; align-items: center; gap: 15px; }
        #searchBar { flex: 1; padding: 10px 20px; border: 1px solid var(--ecs-border); border-radius: 50px; outline: none; }
        
        .table-wrapper { flex: 1; overflow: auto; margin: 15px; border: 1px solid var(--ecs-border); border-radius: 8px; }
        table { border-collapse: separate; border-spacing: 0; font-size: 11px; width: max-content; min-width: 100%; }
        th { background: #F9FAFB; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--ecs-border); padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid var(--ecs-border); white-space: nowrap; }
        tr:hover td { background-color: #FFF9F5; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="sidebar-logo">F<span>A</span>ST</div>
        <div class="login-card">
            <input type="text" id="u" placeholder="Email">
            <input type="password" id="p" placeholder="Password">
            <button onclick="handleLogin()" id="login-btn">Sign In</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav id="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo" style="color:white; font-size:1.5rem;">F<span>A</span>ST</div></div>
            <div class="nav-label">Views</div>
            <div class="nav-item active"><span>All Jobs</span><span id="count-all">0</span></div>
            <div style="margin-top:auto; padding:20px;">
                <button onclick="forceSync()" style="width:100%; margin-bottom:10px; background:#4B5563; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer;">Force Reload</button>
                <button onclick="logout()" style="width:100%; background:#EF4444; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer;">Logout</button>
            </div>
        </nav>

        <main id="main-content">
            <header><h2 id="view-title" style="margin:0;">Dashboard</h2><div id="sync-status">Ready</div></header>
            <div class="controls-area">
                <input type="text" id="searchBar" oninput="renderTable()" placeholder="Search...">
            </div>
            <div class="table-wrapper" id="table-output">
                <p style="padding:20px;">Loading data...</p>
            </div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxzp0O_jrTZlavVyXAUGkizEeGstozVKca1VWdeqns-gIVixo5ZLWa65YD546vUkU7nmQ/exec";
        
        let UI_CACHE = JSON.parse(localStorage.getItem('fast_data_cache') || "[]");
        let ROW_HASHES = JSON.parse(localStorage.getItem('fast_hash_cache') || "{}");
        let HEADERS = JSON.parse(localStorage.getItem('fast_headers_cache') || "[]");

        window.onload = () => { if (localStorage.getItem("fast_active") === "true") showDashboard(); };

        async function handleLogin() {
            const u = document.getElementById('u').value.trim(), p = document.getElementById('p').value.trim();
            if(!u || !p) return alert("Enter credentials");
            try {
                const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`, { method: 'GET', mode: 'cors', redirect: 'follow' });
                const data = await res.json();
                if(data.result === "success") { localStorage.setItem("fast_active", "true"); showDashboard(); } 
                else { alert("Login failed: " + data.reason); }
            } catch (e) { alert("Connection Error"); }
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            if(UI_CACHE.length > 0) renderTable();
            performSurgicalSync();
            setInterval(performSurgicalSync, 30000); 
        }

        async function performSurgicalSync() {
            document.getElementById('sync-status').innerText = "Syncing...";
            try {
                const res = await fetch(`${SCRIPT_URL}?action=sync_surgical&hashes=${encodeURIComponent(JSON.stringify(ROW_HASHES))}`, { method: 'GET', mode: 'cors', redirect: 'follow' });
                const json = await res.json();
                
                if (json.result === "success") {
                    HEADERS = json.headers;
                    localStorage.setItem('fast_headers_cache', JSON.stringify(HEADERS));
                    
                    if (json.updates && json.updates.length > 0) {
                        console.log("Updates received:", json.updates.length);
                        const fIdx = HEADERS.indexOf("File Number");
                        
                        json.updates.forEach(up => {
                            const fNum = fIdx !== -1 ? String(up.data[fIdx]) : null;
                            const exIdx = fNum ? UI_CACHE.findIndex(r => String(r[fIdx]) === fNum) : -1;
                            
                            if(exIdx !== -1) UI_CACHE[exIdx] = up.data; 
                            else UI_CACHE.unshift(up.data);
                            
                            if(fNum) ROW_HASHES[fNum] = up.hash;
                        });

                        localStorage.setItem('fast_data_cache', JSON.stringify(UI_CACHE));
                        localStorage.setItem('fast_hash_cache', JSON.stringify(ROW_HASHES));
                        renderTable();
                    }
                    document.getElementById('sync-status').innerText = "✓ Connected | " + new Date().toLocaleTimeString();
                    document.getElementById('count-all').innerText = UI_CACHE.length;
                }
            } catch (e) { document.getElementById('sync-status').innerText = "⚠ Sync Error"; }
        }

        function renderTable() {
            if(!HEADERS || HEADERS.length === 0) return;
            const q = document.getElementById("searchBar").value.toUpperCase();
            let filtered = UI_CACHE.filter(r => r.join(" ").toUpperCase().includes(q));

            let html = `<table><thead><tr>`;
            HEADERS.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            filtered.forEach(r => {
                html += `<tr>`;
                r.forEach(cell => html += `<td>${cell || ''}</td>`);
                html += `</tr>`;
            });
            document.getElementById('table-output').innerHTML = html + `</tbody></table>`;
        }

        function forceSync() {
            localStorage.removeItem('fast_hash_cache');
            ROW_HASHES = {};
            performSurgicalSync();
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
