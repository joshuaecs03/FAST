<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ecs-orange: #D4631E; 
            --ecs-dark: #1A1A1A;
            --ecs-border: #E5E7EB;
            --ecs-bg: #F9FAFB;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; background-color: var(--ecs-bg); color: var(--ecs-dark);
            height: 100vh; overflow: hidden;
        }

        .hidden { display: none !important; }

        /* AUTHENTICATION AESTHETIC */
        #login-screen { 
            height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: linear-gradient(135deg, #fdfdfd 0%, #f3f4f6 100%);
        }
        .login-card { 
            background: white; padding: 48px; border-radius: 8px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); width: 360px; text-align: center; 
        }
        .login-card h1 { 
            font-family: 'Montserrat', sans-serif; color: var(--ecs-dark); 
            font-size: 2.5rem; margin: 0; letter-spacing: 6px; 
        }
        .login-card p { font-size: 12px; color: #6B7280; text-transform: uppercase; margin-bottom: 32px; letter-spacing: 1px; }
        
        input { 
            width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--ecs-border);
            border-radius: 6px; font-size: 14px; outline: none; transition: border 0.2s;
        }
        input:focus { border-color: var(--ecs-orange); }
        
        button.primary { 
            width: 100%; padding: 14px; background: var(--ecs-orange); color: white; 
            border: none; border-radius: 6px; cursor: pointer; font-weight: 600; 
            text-transform: uppercase; margin-top: 16px; transition: opacity 0.2s;
        }
        button.primary:hover { opacity: 0.9; }

        /* PROFESSIONAL DASHBOARD */
        #dashboard { display: flex; flex-direction: column; height: 100vh; }
        
        header { 
            background: white; padding: 0 24px; height: 64px; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ecs-border);
        }
        .brand { font-family: 'Montserrat', sans-serif; font-size: 1.25rem; letter-spacing: 2px; }
        .brand span { color: var(--ecs-orange); }

        .search-container { 
            padding: 24px; background: white; display: flex; justify-content: center;
        }
        .search-wrapper { position: relative; width: 100%; max-width: 800px; }
        #searchBar { 
            width: 100%; padding: 16px 20px; border: 1px solid var(--ecs-border); 
            border-radius: 100px; font-size: 16px; background: var(--ecs-bg);
            box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #searchBar:focus { background: white; border-color: var(--ecs-orange); box-shadow: 0 0 0 4px rgba(212, 99, 30, 0.1); }

        /* DATA GRID */
        .table-wrapper { 
            flex: 1; overflow: auto; background: white; margin: 0 24px 24px 24px; 
            border: 1px solid var(--ecs-border); border-radius: 8px;
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
        th { 
            background-color: #F9FAFB; color: #4B5563; font-weight: 600; 
            text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;
            padding: 16px 20px; border-bottom: 1px solid var(--ecs-border);
            position: sticky; top: 0; z-index: 10; text-align: left;
        }
        td { padding: 14px 20px; border-bottom: 1px solid var(--ecs-border); white-space: nowrap; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #FFF9F5; }

        .loader { font-size: 13px; color: var(--ecs-orange); margin-top: 12px; font-weight: 600; }
        .logout-btn { 
            background: transparent; border: 1px solid var(--ecs-border); padding: 8px 16px;
            border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600;
        }
        .logout-btn:hover { background: #F3F4F6; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>FAST</h1>
            <p>Field Analysis & Storage Tracking</p>
            <input type="text" id="userInput" placeholder="Email Address">
            <input type="password" id="passInput" placeholder="Password">
            <button class="primary" onclick="handleLogin()">Log In</button>
            <p id="loginStatus" style="color: #EF4444; margin-top: 16px; text-transform: none;"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <header>
            <div class="brand">F<span>A</span>ST</div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </header>
        
        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" id="searchBar" oninput="debounceSearch()" placeholder="Search Xcelerate records...">
                <div id="search-loader" class="loader hidden">Searching database...</div>
            </div>
        </div>

        <div id="table-output" class="table-wrapper">
            <div style="padding: 100px; text-align: center; color: #9CA3AF; font-size: 14px;">
                Enter a search term to retrieve data from Xcelerate.
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwarttJ3JBpEyGUGCROHx7ctdpX9xEMj8qrgX48huawx5-xEWtvx55NU3oR-frBxDfcyQ/exec";
        let searchTimer;

        window.onload = () => { if (localStorage.getItem("fast_session") === "true") showDashboard(); };

        async function handleLogin() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            const status = document.getElementById('loginStatus');
            status.innerText = "Authenticating...";
            try {
                const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`);
                const data = await res.json();
                if(data.result === "success") {
                    localStorage.setItem("fast_session", "true");
                    showDashboard();
                } else { status.innerText = "Invalid credentials."; }
            } catch(e) { status.innerText = "Connection error."; }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        function debounceSearch() {
            clearTimeout(searchTimer);
            const q = document.getElementById("searchBar").value;
            if (q.length < 2) return;
            document.getElementById("search-loader").classList.remove("hidden");
            searchTimer = setTimeout(() => executeSearch(q), 400);
        }

        async function executeSearch(query) {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=search&q=${encodeURIComponent(query)}`);
                const json = await res.json();
                renderTable(json.headers, json.data);
            } finally { document.getElementById("search-loader").classList.add("hidden"); }
        }

        function renderTable(headers, rows) {
            const output = document.getElementById("table-output");
            if (!rows || rows.length === 0) {
                output.innerHTML = "<div style='padding:100px; text-align:center; color:#9CA3AF;'>No matching records found.</div>";
                return;
            }
            let html = `<table><thead><tr>`;
            headers.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            rows.forEach(row => {
                html += `<tr>`;
                row.forEach(cell => html += `<td>${cell || ''}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            output.innerHTML = html;
        }
    </script>
</body>
</html>
