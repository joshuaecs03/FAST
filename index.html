<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #111827; --ecs-border: #E5E7EB; --ecs-bg: #F9FAFB; --sidebar-width: 280px; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--ecs-bg); color: var(--ecs-dark); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* BOLD LOGIN BRANDING */
        #login-screen { text-align: center; padding-top: 15vh; height: 100vh; background: var(--ecs-bg); }
        .login-brand { font-family: 'Montserrat', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 8px; font-size: 3.5rem; color: #000; margin-bottom: 30px; }
        .login-brand span { color: var(--ecs-orange); }
        .login-card { width: 360px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 14px; }
        #login-btn { width: 100%; padding: 16px; background: var(--ecs-orange); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; text-transform: uppercase; }

        /* SIDEBAR */
        #dashboard { display: flex; height: 100vh; }
        #sidebar { width: var(--sidebar-width); background: #1F2937; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid #374151; }
        .sidebar-logo-small { font-family: 'Montserrat', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; font-size: 1.2rem; }
        .sidebar-logo-small span { color: var(--ecs-orange); }
        .nav-label { font-size: 10px; color: #6B7280; padding: 25px 25px 5px 25px; text-transform: uppercase; font-weight: 600; }
        .nav-item { padding: 12px 25px; cursor: pointer; font-size: 13px; color: #9CA3AF; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid transparent; transition: 0.2s; }
        .nav-item.active { background: #111827; color: white; border-left: 4px solid var(--ecs-orange); font-weight: 600; }
        .nav-count { font-size: 10px; background: #374151; color: #9CA3AF; padding: 2px 8px; border-radius: 10px; }

        /* DASHBOARD & TABLE */
        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
        header { background: white; padding: 0 30px; height: 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ecs-border); }
        .controls-area { padding: 10px 30px; border-bottom: 1px solid var(--ecs-border); display: flex; align-items: center; gap: 12px; }
        #searchBar { flex: 1; padding: 8px 18px; border: 1px solid var(--ecs-border); border-radius: 50px; outline: none; background: #f3f4f6; font-size: 13px; }
        #col-toggle-btn { background: white; border: 1px solid var(--ecs-border); padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: #374151; transition: 0.2s; }
        #col-toggle-btn:hover { background: #f9fafb; border-color: #d1d5db; }

        .table-wrapper { flex: 1; overflow: auto; margin: 15px; border: 1px solid var(--ecs-border); border-radius: 6px; position: relative; }
        table { border-collapse: separate; border-spacing: 0; font-size: 11px; width: auto; table-layout: fixed; }
        th { background: #F9FAFB; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--ecs-border); border-right: 1px solid #eee; text-align: left; padding: 0; color: #6B7280; font-weight: 700; text-transform: uppercase; user-select: none; }
        .th-content { padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; }
        .resizer { width: 4px; position: absolute; right: 0; top: 0; bottom: 0; cursor: col-resize; background: transparent; }
        .resizer:hover, .resizing { background: var(--ecs-orange); }
        td { padding: 6px 10px; border-bottom: 1px solid #f3f4f6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-right: 1px solid #f9f9f9; color: #374151; }
        tr:hover td { background-color: #FFF9F5; }

        /* CLEAN COLUMN SETTINGS MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-card { background: white; width: 320px; max-height: 80vh; border-radius: 10px; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 1px solid #d1d5db; }
        .modal-header { padding: 12px 16px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-header span { font-weight: 700; font-size: 13px; color: #111827; }
        .modal-header button { font-size: 9px; color: #2563eb; background: none; border: none; cursor: pointer; font-weight: 600; padding: 0; }
        .modal-search-container { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; }
        .modal-search-container input { padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; width: 100%; box-sizing: border-box; outline: none; }
        .modal-body { padding: 8px 12px; overflow-y: auto; flex: 1; }
        
        /* THE SURGICAL COLUMN ITEM */
        .col-item { display: grid; grid-template-columns: 24px 1fr 20px; align-items: center; padding: 6px 8px; border-radius: 4px; margin-bottom: 2px; transition: 0.1s; cursor: grab; background: #fff; }
        .col-item:hover { background: #f9fafb; border: 1px solid #eee; padding: 5px 7px; }
        .col-item input { margin: 0; width: 13px; height: 13px; cursor: pointer; }
        .col-item span { font-size: 11px; color: #374151; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .drag-icon { color: #d1d5db; font-size: 12px; text-align: right; }

        .modal-footer { padding: 12px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 8px; background: #fcfcfc; border-radius: 0 0 10px 10px; }
        .btn-apply { background: var(--ecs-orange); color: white; border: none; padding: 6px 14px; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; }

        /* NARROW FILTER POPOVER */
        .filter-popover { position: fixed; background: white; border: 1px solid #bbb; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 110; width: 160px; display: none; }
        .filter-header { padding: 6px 8px; background: #f3f4f6; border-bottom: 1px solid #ddd; font-weight: 700; font-size: 10px; display: flex; justify-content: space-between; color: #4B5563; text-transform: uppercase; }
        .filter-search-container { padding: 5px; border-bottom: 1px solid #eee; }
        .filter-search-container input { padding: 4px 6px; border: 1px solid #ddd; border-radius: 3px; font-size: 11px; width: 100%; box-sizing: border-box; outline: none; }
        .filter-list { max-height: 140px; overflow-y: auto; padding: 2px 0; }
        .filter-item { display: grid; grid-template-columns: 20px 1fr; align-items: center; padding: 3px 8px; cursor: pointer; font-size: 11px; }
        .filter-item:hover { background: #f0f7ff; }
        .filter-item input { margin: 0; transform: scale(0.8); }
        .filter-footer { padding: 6px 8px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 5px; }
        .filter-btn-ok { background: var(--ecs-orange); color: white; border: none; padding: 3px 10px; border-radius: 3px; font-size: 10px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-brand">F<span>A</span>ST</div>
        <div class="login-card">
            <input type="text" id="u" placeholder="Email Address">
            <input type="password" id="p" placeholder="Password">
            <button onclick="handleLogin()" id="login-btn">Sign In</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav id="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo-small">F<span>A</span>ST</div></div>
            <div class="nav-label">Status Views</div>
            <div class="nav-item active" onclick="setView('All Jobs', this)"><span>All Jobs</span><span class="nav-count" id="cnt-all">-</span></div>
            <div class="nav-item" onclick="setView('Completed Jobs', this)"><span>Completed Jobs</span><span class="nav-count" id="cnt-comp">-</span></div>
            <div class="nav-item" onclick="setView('Completed Job - Factored', this)"><span>Completed Factored</span><span class="nav-count" id="cnt-fact">-</span></div>
            <div class="nav-item" onclick="setView('Testing Only Invoicing', this)"><span>Testing Invoicing</span><span class="nav-count" id="cnt-test">-</span></div>
            <div class="nav-item" onclick="setView('Project Awaiting Approval', this)"><span>Awaiting Approval</span><span class="nav-count" id="cnt-awat">-</span></div>
            <div style="margin-top:auto; padding:20px;"><button onclick="logout()" style="width:100%; background:none; border:1px solid #4B5563; color:#9CA3AF; padding:10px; border-radius:6px; cursor:pointer; font-size: 12px;">Logout</button></div>
        </nav>

        <main id="main-content">
            <header><h2 id="view-title" style="margin:0; font-size:1rem; font-weight: 600;">All Jobs</h2><div id="sync-status" style="font-size:10px; color:#9CA3AF;">Syncing...</div></header>
            <div class="controls-area">
                <input type="text" id="searchBar" oninput="renderTable()" placeholder="Search data...">
                <button id="col-toggle-btn" onclick="toggleColModal()">
                    <span style="font-size:14px;">⚙</span> Column Settings
                </button>
            </div>
            <div class="table-wrapper" id="table-output"></div>
        </main>
    </div>

    <div id="filter-popover" class="filter-popover">
        <div class="filter-header"><span id="filter-title">Filter</span><button onclick="closeFilter()" style="border:none; background:none; cursor:pointer;">&times;</button></div>
        <div class="filter-search-container"><input type="text" id="filter-search" placeholder="Search..." oninput="refreshFilterList()"></div>
        <div style="padding: 2px 8px; display: flex; gap: 10px;"><button onclick="toggleAllFilter(true)" style="font-size:9px; color:#2563eb; border:none; background:none; cursor:pointer;">Select All</button><button onclick="toggleAllFilter(false)" style="font-size:9px; color:#2563eb; border:none; background:none; cursor:pointer;">None</button></div>
        <div id="filter-list" class="filter-list"></div>
        <div class="filter-footer"><button onclick="clearFilter()" style="font-size:10px; border:none; background:none; cursor:pointer; color:#6B7280; margin-right:auto;">Reset</button><button class="filter-btn-ok" onclick="applyFilter()">OK</button></div>
    </div>

    <div id="col-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <span>Column Visibility</span>
                <div style="display:flex; gap:10px;">
                    <button onclick="toggleAllCols(true)">All</button>
                    <button onclick="toggleAllCols(false)">None</button>
                </div>
            </div>
            <div class="modal-search-container">
                <input type="text" id="modal-col-search" placeholder="Search columns..." oninput="filterModalCols()">
            </div>
            <div class="modal-body" id="col-list-container"></div>
            <div class="modal-footer">
                <button onclick="toggleColModal()" style="font-size:11px; border:none; background:none; cursor:pointer; color:#6B7280;">Cancel</button>
                <button onclick="saveColumnConfig()" class="btn-apply">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw03qwvQXRxh1fzuiGTrngVraBGETG-OVFS81dww9Mboe21Ddk3htTGqDJy3xLeHvMpbQ/exec";
        let UI_CACHE = [], HEADERS = [], ROW_HASHES = {};
        let CURRENT_VIEW = 'All Jobs', CURRENT_FILTER_COL = null, ACTIVE_FILTERS = {}; 
        let ACTIVE_COLS = JSON.parse(localStorage.getItem('fast_active_cols')) || ["File Number", "File Name", "Status", "Customer Name", "Insurance Company", "Total Invoice"];
        let COL_WIDTHS = JSON.parse(localStorage.getItem('fast_col_widths')) || {};

        window.onload = () => { if (localStorage.getItem("fast_active") === "true") showDashboard(); };

        async function handleLogin() {
            const u = document.getElementById('u').value.trim(), p = document.getElementById('p').value.trim();
            if(!u || !p) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`);
                const data = await res.json();
                if(data.result === "success") { localStorage.setItem("fast_active", "true"); showDashboard(); } 
                else alert(data.reason);
            } catch (e) { alert("Connection Error."); }
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            UI_CACHE = JSON.parse(localStorage.getItem('fast_data_cache') || "[]");
            HEADERS = JSON.parse(localStorage.getItem('fast_headers_cache') || "[]");
            ROW_HASHES = JSON.parse(localStorage.getItem('fast_hash_cache') || "{}");
            if(UI_CACHE.length > 0) renderTable();
            performSurgicalSync();
            setInterval(performSurgicalSync, 30000);
        }

        async function performSurgicalSync() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=sync_surgical&hashes=${encodeURIComponent(JSON.stringify(ROW_HASHES))}`);
                const json = await res.json();
                if (json.result === "
