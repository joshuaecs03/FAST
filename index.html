<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST - ECS Asbestos</title>
    <style>
        :root { --primary: #003366; --accent: #c0392b; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f9; }
        .hidden { display: none !important; }
        
        #login-container { height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        
        header { background: var(--primary); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .table-wrapper { padding: 20px; overflow: auto; height: calc(100vh - 80px); }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 11px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; white-space: nowrap; }
        th { background: #eee; position: sticky; top: 0; }
        
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="card">
            <h1>FAST</h1>
            <p>Field Analysis & Storage Tracking</p>
            <button id="entryBtn" style="padding:15px 30px; cursor:pointer;" onclick="enterPortal()">Enter FAST Portal</button>
            <div id="loader" class="hidden"><div class="loader"></div><p>Verifying ECS Credentials...</p></div>
            <p id="status" style="margin-top: 20px; color: red;"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <header>
            <div style="font-weight: bold; font-size: 1.5rem;">FAST PORTAL</div>
            <div id="user-info"></div>
        </header>
        <div class="table-wrapper" id="table-output"></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/a/macros/ecs-asbestos.com/s/AKfycbwarttJ3JBpEyGUGCROHx7ctdpX9xEMj8qrgX48huawx5-xEWtvx55NU3oR-frBxDfcyQ/exec";

        async function enterPortal() {
            const btn = document.getElementById('entryBtn');
            const loader = document.getElementById('loader');
            const status = document.getElementById('status');
            
            btn.classList.add('hidden');
            loader.classList.remove('hidden');
            status.innerText = "";

            try {
                const response = await fetch(`${SCRIPT_URL}?action=getData`);
                const result = await response.json();

                if (result.result === "success") {
                    document.getElementById('login-container').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    document.getElementById('user-info').innerText = result.user;
                    renderTable(result.data);
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                loader.classList.add('hidden');
                btn.classList.remove('hidden');
                status.innerHTML = "Access Denied. Ensure you are logged into @ecs-asbestos.com";
                console.error(err);
            }
        }

        function renderTable(data) {
            let html = `<table><thead><tr>`;
            Object.keys(data[0]).forEach(k => html += `<th>${k}</th>`);
            html += `</tr></thead><tbody>`;
            data.forEach(row => {
                html += `<tr>`;
                Object.values(row).forEach(v => html += `<td>${v || ''}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('table-output').innerHTML = html;
        }
    </script>
</body>
</html>
