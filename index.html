<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xcelerate Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { color: #333; text-align: center; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #34495e; }
        #message { color: red; text-align: center; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Xcelerate Portal</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="message"></div>
</div>

<script>
    // PASTE YOUR GOOGLE DEPLOYMENT URL HERE
    const WEB_APP_URL = "YOUR_APPS_SCRIPT_URL_HERE";

    async function login() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const msg = document.getElementById('message');

        msg.innerText = "Authenticating...";

        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // Essential for Google Apps Script redirects
                body: JSON.stringify({ username: user, password: pass })
            });

            // Since 'no-cors' doesn't let us read the JSON response easily, 
            // for a "Low Code" simple login, we usually use a different fetch approach 
            // or redirect based on a successful hit. 
            
            // For 5 users, the most reliable simple way is to use a standard GET:
            const authUrl = `${WEB_APP_URL}?username=${user}&password=${pass}`;
            const check = await fetch(authUrl);
            const result = await check.json();

            if(result.result === "success") {
                localStorage.setItem("userRole", result.role);
                alert("Login Successful! Welcome " + user);
                // window.location.href = "dashboard.html"; 
            } else {
                msg.innerText = "Invalid username or password.";
            }
        } catch (error) {
            msg.innerText = "Error connecting to backend.";
            console.error(error);
        }
    }
</script>
</body>
</html>
