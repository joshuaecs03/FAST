<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #111827; --ecs-border: #E5E7EB; --ecs-bg: #F9FAFB; --sidebar-width: 260px; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--ecs-bg); color: var(--ecs-dark); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* Sidebar & Layout */
        #dashboard { display: flex; height: 100vh; }
        #sidebar { width: var(--sidebar-width); background: #1F2937; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #374151; }
        .sidebar-logo-small { font-family: 'Montserrat', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; font-size: 1.1rem; }
        .sidebar-logo-small span { color: var(--ecs-orange); }
        .nav-label { font-size: 9px; color: #6B7280; padding: 20px 20px 5px 20px; text-transform: uppercase; font-weight: 600; }
        .nav-item { padding: 10px 20px; cursor: pointer; font-size: 12px; color: #9CA3AF; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid transparent; transition: 0.2s; }
        .nav-item.active { background: #111827; color: white; border-left: 4px solid var(--ecs-orange); font-weight: 600; }
        .nav-count { font-size: 9px; background: #374151; color: #9CA3AF; padding: 1px 6px; border-radius: 10px; }

        /* Main Content */
        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
        header { background: white; padding: 0 20px; height: 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ecs-border); }
        .controls-area { padding: 10px 20px; border-bottom: 1px solid var(--ecs-border); display: flex; align-items: center; gap: 10px; background: #fff; }
        #searchBar { flex: 1; padding: 8px 18px; border: 1px solid var(--ecs-border); border-radius: 50px; outline: none; background: #f3f4f6; font-size: 13px; }
        
        /* Table & Resizing */
        .table-wrapper { flex: 1; overflow: auto; margin: 15px; border: 1px solid var(--ecs-border); border-radius: 6px; position: relative; }
        table { border-collapse: separate; border-spacing: 0; font-size: 11px; width: auto; table-layout: fixed; }
        th { background: #F9FAFB; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--ecs-border); border-right: 1px solid #eee; text-align: left; padding: 0; color: #4B5563; font-weight: 700; user-select: none; }
        
        .th-content { padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; overflow: hidden; }
        .resizer { width: 4px; position: absolute; right: 0; top: 0; bottom: 0; cursor: col-resize; background: transparent; transition: background 0.2s; }
        .resizer:hover, .resizing { background: var(--ecs-orange); }

        td { padding: 6px 12px; border-bottom: 1px solid #f3f4f6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-right: 1px solid #f9f9f9; color: #374151; }
        tr:hover td { background-color: #FFFBF7; }

        /* Filter Icons & Menus */
        .filter-trigger { cursor: pointer; font-size: 10px; color: #9CA3AF; padding: 2px; border-radius: 3px; }
        .filter-trigger:hover { background: #E5E7EB; color: var(--ecs-dark); }
        .filter-popover { position: fixed; background: white; border: 1px solid var(--ecs-border); border-radius: 6px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); z-index: 100; min-width: 180px; padding: 10px; display: none; }
        .filter-popover input { margin-bottom: 8px; font-size: 12px; padding: 6px; border: 1px solid var(--ecs-border); border-radius: 4px; width: 100%; box-sizing: border-box; }
        .filter-list { max-height: 150px; overflow-y: auto; font-size: 11px; }
        .filter-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; }

        /* Column Manager Modal */
        #col-toggle-btn { background: white; border: 1px solid var(--ecs-border); padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-card { background: white; width: 340px; max-height: 80vh; border-radius: 10px; display: flex; flex-direction: column; }
        .col-item { display: flex; align-items: center; padding: 8px 10px; background: white; border: 1px solid var(--ecs-border); margin-bottom: 4px; border-radius: 6px; cursor: grab; }
        .drag-handle { margin-left: auto; color: #9CA3AF; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-brand">F<span>A</span>ST</div>
        <div class="login-card">
            <input type="text" id="u" placeholder="Email Address">
            <input type="password" id="p" placeholder="Password">
            <button onclick="handleLogin()" id="login-btn">Sign In</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav id="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo-small">F<span>A</span>ST</div></div>
            <div class="nav-label">Status Views</div>
            <div class="nav-item active" onclick="setView('All Jobs', this)"><span>All Jobs</span><span class="nav-count" id="cnt-all">-</span></div>
            <div class="nav-item" onclick="setView('Completed Jobs', this)"><span>Completed Jobs</span><span class="nav-count" id="cnt-comp">-</span></div>
            <div class="nav-item" onclick="setView('Completed Job - Factored', this)"><span>Completed Factored</span><span class="nav-count" id="cnt-fact">-</span></div>
            <div class="nav-item" onclick="setView('Testing Only Invoicing', this)"><span>Testing Invoicing</span><span class="nav-count" id="cnt-test">-</span></div>
            <div class="nav-item" onclick="setView('Project Awaiting Approval', this)"><span>Awaiting Approval</span><span class="nav-count" id="cnt-awat">-</span></div>
            <div style="margin-top:auto; padding:15px;"><button onclick="logout()" style="width:100%; border:1px solid #4B5563; color:#9CA3AF; background:none; padding:8px; border-radius:6px; cursor:pointer; font-size: 11px;">Logout</button></div>
        </nav>

        <main id="main-content">
            <header><h2 id="view-title" style="margin:0; font-size:1rem; font-weight: 600;">All Jobs</h2><div id="sync-status" style="font-size:10px; color:#9CA3AF;">Syncing...</div></header>
            <div class="controls-area">
                <input type="text" id="searchBar" oninput="renderTable()" placeholder="Quick Search...">
                <button id="col-toggle-btn" onclick="toggleColModal()"><span>⚙</span> Columns</button>
            </div>
            <div class="table-wrapper" id="table-output"></div>
        </main>
    </div>

    <div id="filter-popover" class="filter-popover">
        <input type="text" id="filter-search" placeholder="Filter values..." oninput="refreshFilterList()">
        <div class="filter-list" id="filter-list"></div>
        <div style="margin-top:10px; display:flex; justify-content: space-between;">
            <button onclick="clearFilter()" style="font-size:10px; border:none; background:none; cursor:pointer; color:var(--ecs-orange);">Clear</button>
            <button onclick="applyFilter()" style="font-size:10px; background:var(--ecs-orange); color:white; border:none; padding:4px 8px; border-radius:3px; cursor:pointer;">Apply</button>
        </div>
    </div>

    <div id="col-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header" style="padding:15px; border-bottom:1px solid var(--ecs-border); display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:600; font-size:14px;">Edit Columns</span>
                <button onclick="toggleColModal()" style="background:none; border:none; font-size:20px; cursor:pointer;">&times;</button>
            </div>
            <div class="modal-body" id="col-list-container" style="padding:15px; overflow-y:auto;"></div>
            <div class="modal-footer" style="padding:15px; border-top:1px solid var(--ecs-border); display:flex; justify-content:flex-end;">
                <button onclick="saveColumnConfig()" style="background:var(--ecs-orange); color:white; border:none; padding:8px 16px; border-radius:4px; font-weight:600; cursor:pointer;">Save</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw03qwvQXRxh1fzuiGTrngVraBGETG-OVFS81dww9Mboe21Ddk3htTGqDJy3xLeHvMpbQ/exec";
        
        let UI_CACHE = [], HEADERS = [], ROW_HASHES = {};
        let CURRENT_VIEW = 'All Jobs';
        let ACTIVE_COLS = JSON.parse(localStorage.getItem('fast_active_cols')) || ["File Number", "File Name", "Status", "Customer Name", "Insurance Company", "Total Invoice"];
        let COL_WIDTHS = JSON.parse(localStorage.getItem('fast_col_widths')) || {};
        let ACTIVE_FILTERS = {}; // { "Column Name": ["Value1", "Value2"] }
        let CURRENT_FILTER_COL = null;

        window.onload = () => { if (localStorage.getItem("fast_active") === "true") showDashboard(); };

        // --- Auth & Sync ---
        async function handleLogin() {
            const u = document.getElementById('u').value.trim(), p = document.getElementById('p').value.trim();
            if(!u || !p) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`, { method: 'GET', redirect: 'follow' });
                const data = await res.json();
                if(data.result === "success") { localStorage.setItem("fast_active", "true"); showDashboard(); } 
                else { alert(data.reason); }
            } catch (e) { alert("Error connecting."); }
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            UI_CACHE = JSON.parse(localStorage.getItem('fast_data_cache') || "[]");
            HEADERS = JSON.parse(localStorage.getItem('fast_headers_cache') || "[]");
            ROW_HASHES = JSON.parse(localStorage.getItem('fast_hash_cache') || "{}");
            if(UI_CACHE.length > 0) { renderTable(); updateCounts(); }
            performSurgicalSync();
            setInterval(performSurgicalSync, 30000);
        }

        async function performSurgicalSync() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=sync_surgical&hashes=${encodeURIComponent(JSON.stringify(ROW_HASHES))}`);
                const json = await res.json();
                if (json.result === "success") {
                    HEADERS = json.headers;
                    localStorage.setItem('fast_headers_cache', JSON.stringify(HEADERS));
                    if (json.updates && json.updates.length > 0) {
                        const fIdx = HEADERS.indexOf("File Number");
                        json.updates.forEach(up => {
                            const exIdx = UI_CACHE.findIndex(r => String(r[fIdx]) === String(up.id));
                            if(exIdx !== -1) UI_CACHE[exIdx] = up.data; else UI_CACHE.unshift(up.data);
                            ROW_HASHES[up.id] = up.hash;
                        });
                        localStorage.setItem('fast_data_cache', JSON.stringify(UI_CACHE));
                        localStorage.setItem('fast_hash_cache', JSON.stringify(ROW_HASHES));
                        renderTable();
                        updateCounts();
                    }
                    document.getElementById('sync-status').innerText = "✓ " + UI_CACHE.length + " Jobs";
                }
            } catch (e) {}
        }

        // --- Table Rendering with Resize & Filter Hooks ---
        function renderTable() {
            if (!HEADERS.length) return;
            const sIdx = HEADERS.indexOf("Status");
            const q = document.getElementById("searchBar").value.toUpperCase();

            let filtered = UI_CACHE.filter(r => {
                const matchesView = (CURRENT_VIEW === 'All Jobs' || String(r[sIdx]) === CURRENT_VIEW);
                const matchesSearch = r.join(" ").toUpperCase().includes(q);
                
                // Column Specific Filters
                let matchesFilters = true;
                for (let col in ACTIVE_FILTERS) {
                    const val = String(r[HEADERS.indexOf(col)]);
                    if (!ACTIVE_FILTERS[col].includes(val)) { matchesFilters = false; break; }
                }
                return matchesView && matchesSearch && matchesFilters;
            });

            let html = `<table><thead><tr>`;
            ACTIVE_COLS.forEach(c => {
                const width = COL_WIDTHS[c] || 150;
                html += `<th style="width: ${width}px;" data-col="${c}">
                    <div class="th-content">
                        <span style="overflow:hidden; text-overflow:ellipsis;">${c}</span>
                        <span class="filter-trigger" onclick="openFilter(event, '${c}')">▼</span>
                    </div>
                    <div class="resizer"></div>
                </th>`;
            });
            html += `</tr></thead><tbody>`;
            
            filtered.forEach(r => {
                html += `<tr>`;
                ACTIVE_COLS.forEach(c => {
                    const idx = HEADERS.indexOf(c);
                    const val = idx !== -1 ? (r[idx] || '') : '';
                    html += `<td>${val}</td>`;
                });
                html += `</tr>`;
            });
            document.getElementById('table-output').innerHTML = html + `</tbody></table>`;
            initResizers();
        }

        // --- Resizing Logic ---
        function initResizers() {
            document.querySelectorAll('.resizer').forEach(resizer => {
                resizer.addEventListener('mousedown', (e) => {
                    const th = resizer.parentElement;
                    const colName = th.dataset.col;
                    const startX = e.pageX;
                    const startWidth = th.offsetWidth;
                    resizer.classList.add('resizing');

                    const onMouseMove = (e) => {
                        const newWidth = Math.max(50, startWidth + (e.pageX - startX));
                        th.style.width = newWidth + 'px';
                        COL_WIDTHS[colName] = newWidth;
                    };

                    const onMouseUp = () => {
                        resizer.classList.remove('resizing');
                        localStorage.setItem('fast_col_widths', JSON.stringify(COL_WIDTHS));
                        document.removeEventListener('mousemove', onMouseMove);
                        document.removeEventListener('mouseup', onMouseUp);
                    };

                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                });
            });
        }

        // --- Filtering Logic ---
        function openFilter(e, colName) {
            e.stopPropagation();
            CURRENT_FILTER_COL = colName;
            const popover = document.getElementById('filter-popover');
            popover.style.display = 'block';
            popover.style.top = (e.clientY + 10) + 'px';
            popover.style.left = (e.clientX - 100) + 'px';
            document.getElementById('filter-search').value = '';
            refreshFilterList();
        }

        function refreshFilterList() {
            const idx = HEADERS.indexOf(CURRENT_FILTER_COL);
            const search = document.getElementById('filter-search').value.toLowerCase();
            const uniqueValues = [...new Set(UI_CACHE.map(r => String(r[idx])))].sort();
            
            let html = '';
            uniqueValues.filter(v => v.toLowerCase().includes(search)).forEach(v => {
                const checked = (!ACTIVE_FILTERS[CURRENT_FILTER_COL] || ACTIVE_FILTERS[CURRENT_FILTER_COL].includes(v)) ? 'checked' : '';
                html += `<div class="filter-item"><input type="checkbox" value="${v}" ${checked}> ${v || '(Empty)'}</div>`;
            });
            document.getElementById('filter-list').innerHTML = html;
        }

        function applyFilter() {
            const selected = [];
            document.querySelectorAll('#filter-list input:checked').forEach(i => selected.push(i.value));
            ACTIVE_FILTERS[CURRENT_FILTER_COL] = selected;
            document.getElementById('filter-popover').style.display = 'none';
            renderTable();
        }

        function clearFilter() {
            delete ACTIVE_FILTERS[CURRENT_FILTER_COL];
            document.getElementById('filter-popover').style.display = 'none';
            renderTable();
        }

        // Global click to close popover
        window.addEventListener('click', () => { document.getElementById('filter-popover').style.display = 'none'; });
        document.getElementById('filter-popover').onclick = (e) => e.stopPropagation();

        // --- Column Manager ---
        function toggleColModal() {
            const modal = document.getElementById('col-modal');
            modal.classList.toggle('hidden');
            if(!modal.classList.contains('hidden')) {
                const container = document.getElementById('col-list-container');
                container.innerHTML = '';
                const all = HEADERS.length ? HEADERS : ACTIVE_COLS;
                [...new Set([...ACTIVE_COLS, ...all])].forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'col-item'; div.dataset.id = c;
                    div.innerHTML = `<input type="checkbox" class="col-check" ${ACTIVE_COLS.includes(c)?'checked':''}> <span style="font-size:12px">${c}</span> <span class="drag-handle">⠿</span>`;
                    container.appendChild(div);
                });
                new Sortable(container, { animation: 150, handle: '.drag-handle' });
            }
        }

        function saveColumnConfig() {
            const newActive = [];
            document.querySelectorAll('.col-item').forEach(i => { if(i.querySelector('.col-check').checked) newActive.push(i.dataset.id); });
            ACTIVE_COLS = newActive;
            localStorage.setItem('fast_active_cols', JSON.stringify(ACTIVE_COLS));
            renderTable(); toggleColModal();
        }

        function updateCounts() {
            const sIdx = HEADERS.indexOf("Status"); if(sIdx === -1) return;
            const c = { all: UI_CACHE.length, comp: 0, fact: 0, test: 0, awat: 0 };
            UI_CACHE.forEach(r => {
                const s = String(r[sIdx]);
                if(s === "Completed Jobs") c.comp++;
                else if(s === "Completed Job - Factored") c.fact++;
                else if(s === "Testing Only Invoicing") c.test++;
                else if(s === "Project Awaiting Approval") c.awat++;
            });
            document.getElementById('cnt-all').innerText = c.all;
            document.getElementById('cnt-comp').innerText = c.comp;
            document.getElementById('cnt-fact').innerText = c.fact;
            document.getElementById('cnt-test').innerText = c.test;
            document.getElementById('cnt-awat').innerText = c.awat;
        }

        function setView(v, el) {
            CURRENT_VIEW = v;
            document.getElementById('view-title').innerText = v;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            renderTable();
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
