<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --ecs-orange: #D4631E; 
            --ecs-dark: #111827;
            --ecs-border: #E5E7EB;
            --ecs-bg: #F9FAFB;
            --sidebar-width: 280px;
        }
        
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--ecs-bg); color: var(--ecs-dark); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* AUTH UI */
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: #f3f4f6; }
        .login-card { background: white; padding: 60px; border-radius: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); width: 340px; text-align: center; }
        .brand-logo { font-family: 'Montserrat', sans-serif; font-weight: 700; color: var(--ecs-dark); text-transform: uppercase; }
        .brand-logo span { color: var(--ecs-orange); }

        input.auth-input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--ecs-border); border-radius: 8px; box-sizing: border-box; outline: none; }
        input.auth-input:focus { border-color: var(--ecs-orange); }
        button.primary { width: 100%; padding: 14px; background: var(--ecs-orange); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; text-transform: uppercase; margin-top: 10px; }

        /* MAIN LAYOUT */
        #dashboard { display: flex; height: 100vh; }

        /* SIDEBAR (Dark Panel) */
        #sidebar { width: var(--sidebar-width); background: #1F2937; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 30px; border-bottom: 1px solid #374151; }
        .sidebar-logo { font-family: 'Montserrat', sans-serif; color: white; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; font-size: 1.6rem; }
        .sidebar-logo span { color: var(--ecs-orange); }

        .nav-label { font-size: 10px; color: #6B7280; padding: 25px 30px 5px 30px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .nav-item { padding: 16px 30px; cursor: pointer; font-size: 13px; color: #9CA3AF; transition: 0.2s; border-left: 4px solid transparent; display: flex; align-items: center; justify-content: space-between; }
        .nav-item:hover { background: #374151; color: white; }
        .nav-item.active { background: #111827; color: white; border-left: 4px solid var(--ecs-orange); font-weight: 600; }
        .nav-count { font-size: 10px; background: #374151; color: #9CA3AF; padding: 2px 8px; border-radius: 10px; }

        /* CONTENT AREA */
        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
        header { background: white; padding: 0 30px; height: 70px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ecs-border); flex-shrink: 0; }
        .search-area { padding: 20px 30px; background: white; border-bottom: 1px solid var(--ecs-border); display: flex; gap: 15px; align-items: center; }
        #searchBar { flex: 1; padding: 14px 20px; border: 1px solid var(--ecs-border); border-radius: 50px; font-size: 15px; outline: none; }

        /* COLUMN SELECTOR */
        .dropdown { position: relative; }
        .dropbtn { background: white; border: 1px solid var(--ecs-border); padding: 12px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .dropdown-content { display: none; position: absolute; right: 0; background: white; min-width: 280px; max-height: 450px; overflow-y: auto; box-shadow: 0px 8px 16px rgba(0,0,0,0.1); z-index: 100; border-radius: 8px; padding: 15px; border: 1px solid var(--ecs-border); }
        .dropdown:hover .dropdown-content { display: block; }
        .col-item { display: flex; align-items: center; gap: 10px; font-size: 12px; padding: 8px; background: #fff; border-bottom: 1px solid #f3f3f3; cursor: grab; }

        /* TABLE GRID - NO FROZEN COLUMN */
        .table-wrapper { flex: 1; overflow: auto; background: white; margin: 20px; border-radius: 8px; border: 1px solid var(--ecs-border); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12px; }
        th { background: #F9FAFB; padding: 16px; border-bottom: 1px solid var(--ecs-border); position: sticky; top: 0; text-align: left; font-weight: 600; color: #6B7280; text-transform: uppercase; font-size: 10px; z-index: 20; }
        td { padding: 12px 16px; border-bottom: 1px solid var(--ecs-border); white-space: nowrap; color: #374151; }
        tr:hover td { background-color: #FFF9F5; }

        .btn-logout { background: transparent; border: 1px solid var(--ecs-border); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <div class="brand-logo" style="font-size: 3.2rem; margin: 0 0 40px 0; letter-spacing: 8px;">F<span>A</span>ST</div>
            <input type="text" id="u" class="auth-input" placeholder="Email Address">
            <input type="password" id="p" class="auth-input" placeholder="Password">
            <button class="primary" onclick="handleLogin()">Log In</button>
            <p id="loginStatus" style="color:#EF4444; font-size:12px; margin-top:15px;"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav id="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo">F<span>A</span>ST</div></div>
            <div class="nav-label">Status Views</div>
            <div class="nav-item active" onclick="setView('All Jobs', this)"><span>All Jobs</span><span class="nav-count" id="count-all">-</span></div>
            <div class="nav-item" onclick="setView('Completed Jobs', this)"><span>Completed Jobs</span><span class="nav-count" id="count-comp">-</span></div>
            <div class="nav-item" onclick="setView('Project Awaiting Approval', this)"><span>Awaiting Approval</span><span class="nav-count" id="count-awat">-</span></div>
            <div class="nav-item" onclick="setView('Testing Only Invoicing', this)"><span>Testing Invoicing</span><span class="nav-count" id="count-test">-</span></div>
            <div class="nav-item" onclick="setView('Completed Job - Factored', this)"><span>Completed & Factored</span><span class="nav-count" id="count-fact">-</span></div>
            <div style="margin-top: auto; padding: 20px; border-top: 1px solid #374151;">
                <button onclick="logout()" style="width:100%; background:none; border:1px solid #4B5563; color:#9CA3AF; padding:8px; cursor:pointer; font-size:11px; border-radius:4px;">Logout</button>
            </div>
        </nav>

        <main id="main-content">
            <header>
                <h2 id="view-title" style="font-size: 1.2rem; font-weight: 600; margin: 0;">All Jobs</h2>
                <div id="sync-status" style="font-size:11px; color:#9CA3AF;">Syncing...</div>
            </header>
            <div class="search-area">
                <input type="text" id="searchBar" oninput="instantSearch()" placeholder="Search cached records..." disabled>
                <div class="dropdown">
                    <button class="dropbtn">⚙️ Columns</button>
                    <div class="dropdown-content"><div id="checkbox-list"></div></div>
                </div>
            </div>
            <div class="table-wrapper"><div id="table-output"></div></div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwarttJ3JBpEyGUGCROHx7ctdpX9xEMj8qrgX48huawx5-xEWtvx55NU3oR-frBxDfcyQ/exec";
        let CACHE = [], COLUMN_DEFS = [], CURRENT_VIEW = 'All Jobs', STATUS_INDEX = -1;
        const DEFAULT_COLS = ["File Number", "File Name", "Status", "Customer Name", "Loss Address", "State", "Insurance Company", "Referred By", "Referred By Organization Name", "Assigned Adjuster"];

        window.onload = () => { if (localStorage.getItem("fast_active") === "true") init(); };

        async function handleLogin() {
            const u = document.getElementById('u').value, p = document.getElementById('p').value;
            const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`);
            const data = await res.json();
            if(data.result === "success") { localStorage.setItem("fast_active", "true"); init(); }
            else { document.getElementById('loginStatus').innerText = "Access Denied"; }
        }

        async function init() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            const res = await fetch(`${SCRIPT_URL}?action=search&q=`); 
            const json = await res.json();
            CACHE = json.data;
            STATUS_INDEX = json.headers.indexOf("Status");
            
            const saved = localStorage.getItem("fast_col_order_v2");
            if (saved) { COLUMN_DEFS = JSON.parse(saved); } 
            else {
                let ordered = [];
                DEFAULT_COLS.forEach(name => {
                    let idx = json.headers.indexOf(name);
                    if(idx !== -1) ordered.push({ name: name, visible: true, index: idx });
                });
                json.headers.forEach((name, idx) => {
                    if(!DEFAULT_COLS.includes(name)) ordered.push({ name: name, visible: false, index: idx });
                });
                COLUMN_DEFS = ordered;
            }
            buildColSelector();
            updateCounts();
            document.getElementById('sync-status').innerText = "✓ System Ready";
            document.getElementById('searchBar').disabled = false;
            instantSearch();
        }

        function setView(viewName, el) {
            CURRENT_VIEW = viewName;
            document.getElementById('view-title').innerText = viewName;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            instantSearch();
        }

        function updateCounts() {
            if (STATUS_INDEX === -1) return;
            const counts = { all: CACHE.length, comp: 0, awat: 0, test: 0, fact: 0 };
            CACHE.forEach(row => {
                const s = row[STATUS_INDEX];
                if (s === 'Completed Jobs') counts.comp++;
                else if (s === 'Project Awaiting Approval') counts.awat++;
                else if (s === 'Testing Only Invoicing') counts.test++;
                else if (s === 'Completed Job - Factored') counts.fact++;
            });
            document.getElementById('count-all').innerText = counts.all;
            document.getElementById('count-comp').innerText = counts.comp;
            document.getElementById('count-awat').innerText = counts.awat;
            document.getElementById('count-test').innerText = counts.test;
            document.getElementById('count-fact').innerText = counts.fact;
        }

        function buildColSelector() {
            const list = document.getElementById('checkbox-list');
            list.innerHTML = "";
            COLUMN_DEFS.forEach((col, i) => {
                const item = document.createElement('div');
                item.className = 'col-item';
                item.innerHTML = `<span class="handle" style="color:#ccc">⠿</span><input type="checkbox" ${col.visible ? 'checked' : ''} onchange="toggle(${i})"><label style="flex:1; margin-left:8px;">${col.name}</label>`;
                list.appendChild(item);
            });
            new Sortable(list, { animation: 150, onEnd: (evt) => {
                const moved = COLUMN_DEFS.splice(evt.oldIndex, 1)[0];
                COLUMN_DEFS.splice(evt.newIndex, 0, moved);
                localStorage.setItem("fast_col_order_v2", JSON.stringify(COLUMN_DEFS));
                instantSearch();
                buildColSelector();
            }});
        }

        function toggle(i) { COLUMN_DEFS[i].visible = !COLUMN_DEFS[i].visible; localStorage.setItem("fast_col_order_v2", JSON.stringify(COLUMN_DEFS)); instantSearch(); }

        function instantSearch() {
            const q = document.getElementById("searchBar").value.toUpperCase();
            if (!COLUMN_DEFS.length) return;
            const visibleDefs = COLUMN_DEFS.filter(c => c.visible);
            let filtered = CACHE.filter(row => {
                const matchesView = (CURRENT_VIEW === 'All Jobs' || row[STATUS_INDEX] === CURRENT_VIEW);
                const matchesSearch = row.join(" ").toUpperCase().includes(q);
                return matchesView && matchesSearch;
            });
            render(visibleDefs, filtered.slice(0, 100));
        }

        function render(visibleDefs, rows) {
            const out = document.getElementById('table-output');
            if (!rows.length) { out.innerHTML = '<p style="text-align:center; padding:100px; color:#9CA3AF;">No records found.</p>'; return; }
            let html = `<table><thead><tr>`;
            visibleDefs.forEach(c => html += `<th>${c.name}</th>`);
            html += `</tr></thead><tbody>`;
            rows.forEach(row => {
                html += `<tr>`;
                visibleDefs.forEach(c => html += `<td>${row[c.index] || ''}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            out.innerHTML = html;
        }

        function logout() { localStorage.removeItem("fast_active"); location.reload(); }
    </script>
</body>
</html>
