<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #111827; --ecs-border: #E5E7EB; --ecs-bg: #F9FAFB; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--ecs-bg); color: var(--ecs-dark); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* AUTH UI - BRANDED LOGO */
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: #f3f4f6; }
        .login-card { background: white; padding: 60px; border-radius: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); width: 340px; text-align: center; }
        .brand-logo { font-family: 'Montserrat', sans-serif; font-size: 3.2rem; margin: 0 0 40px 0; letter-spacing: 8px; font-weight: 700; color: var(--ecs-dark); }
        .brand-logo span { color: var(--ecs-orange); }

        input.auth-input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--ecs-border); border-radius: 8px; box-sizing: border-box; outline: none; }
        button.primary { width: 100%; padding: 14px; background: var(--ecs-orange); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; text-transform: uppercase; margin-top: 10px; }

        /* DASHBOARD */
        #dashboard { display: flex; flex-direction: column; height: 100vh; }
        header { background: white; padding: 0 30px; height: 70px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ecs-border); }
        .search-area { padding: 30px; background: white; border-bottom: 1px solid var(--ecs-border); text-align: center; }
        #searchBar { width: 100%; max-width: 800px; padding: 16px 25px; border: 1px solid var(--ecs-border); border-radius: 50px; font-size: 16px; outline: none; transition: 0.3s; }
        #searchBar:disabled { background: #eee; cursor: not-allowed; }
        #searchBar:focus { border-color: var(--ecs-orange); box-shadow: 0 0 0 4px rgba(212, 99, 30, 0.1); }

        /* TABLE */
        .table-wrapper { flex: 1; overflow: auto; background: white; margin: 20px; border-radius: 8px; border: 1px solid var(--ecs-border); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12px; }
        th { background: #F9FAFB; padding: 16px; border-bottom: 1px solid var(--ecs-border); position: sticky; top: 0; text-align: left; font-weight: 600; color: #6B7280; text-transform: uppercase; font-size: 10px; z-index: 20; }
        td { padding: 12px 16px; border-bottom: 1px solid var(--ecs-border); white-space: nowrap; }
        
        /* Freeze first column */
        td:first-child, th:first-child { position: sticky; left: 0; background: inherit; z-index: 21; border-right: 1px solid var(--ecs-border); }
        th:first-child { z-index: 30; background: #F9FAFB; }
        tr:hover td { background-color: #FFF9F5; }

        .status-tag { font-size: 11px; color: var(--ecs-orange); font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <div class="brand-logo">F<span>A</span>ST</div>
            <input type="text" id="u" class="auth-input" placeholder="Email Address">
            <input type="password" id="p" class="auth-input" placeholder="Password">
            <button class="primary" onclick="handleLogin()">Log In</button>
            <p id="loginStatus" style="color:red; font-size:12px; margin-top:15px;"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <header>
            <div class="brand-logo" style="font-size: 1.5rem; margin: 0; letter-spacing: 4px;">F<span>A</span>ST</div>
            <button onclick="logout()" style="background:none; border:1px solid #ddd; padding:5px 15px; cursor:pointer; border-radius:5px;">Logout</button>
        </header>
        
        <div class="search-area">
            <input type="text" id="searchBar" oninput="instantSearch()" placeholder="Initial sync in progress..." disabled>
            <div id="sync-status" class="status-tag">Syncing with Xcelerate...</div>
        </div>

        <div class="table-wrapper">
            <div id="table-output"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoO-wu2p2j463ePFB5kW59yv45-hxBo7gV8EK0hqbV5t5q1MVn2K8nvWIOFmk4Q0OxSA/exec";
        let CACHE = [];
        let HEADERS = [];

        window.onload = () => { if (localStorage.getItem("fast_active") === "true") init(); };

        async function handleLogin() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`);
            const data = await res.json();
            if(data.result === "success") {
                localStorage.setItem("fast_active", "true");
                init();
            } else { document.getElementById('loginStatus').innerText = "Access Denied"; }
        }

        async function init() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            
            try {
                const res = await fetch(`${SCRIPT_URL}?action=search&q=`); 
                const json = await res.json();
                HEADERS = json.headers;
                CACHE = json.data;
                
                // Enable search once data is ready
                const sb = document.getElementById('searchBar');
                sb.disabled = false;
                sb.placeholder = "Search Job #, Client, or Location...";
                document.getElementById('sync-status').innerText = "✓ System Ready";
                document.getElementById('sync-status').style.color = "green";
            } catch(e) {
                document.getElementById('sync-status').innerText = "Sync Failed. Refresh Page.";
            }
        }

        function instantSearch() {
            const q = document.getElementById("searchBar").value.toUpperCase();
            if(q.length < 2) { document.getElementById('table-output').innerHTML = ""; return; }
            const filtered = CACHE.filter(r => r.join(" ").toUpperCase().includes(q)).slice(0, 100);
            render(filtered);
        }

        function render(rows) {
            let html = `<table><thead><tr>`;
            HEADERS.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            rows.forEach(row => {
                html += `<tr>`;
                row.forEach(cell => html += `<td>${cell || ''}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('table-output').innerHTML = html;
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
