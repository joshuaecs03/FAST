<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #1A1A1A; --ecs-border: #E5E7EB; --ecs-bg: #F9FAFB; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--ecs-bg); color: var(--ecs-dark); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: #f3f4f6; }
        .login-card { background: white; padding: 48px; border-radius: 8px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); width: 360px; text-align: center; }
        .login-card h1 { font-family: 'Montserrat', sans-serif; color: var(--ecs-dark); font-size: 2.5rem; margin: 0; letter-spacing: 6px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--ecs-border); border-radius: 6px; box-sizing: border-box; }
        button.primary { width: 100%; padding: 14px; background: var(--ecs-orange); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; text-transform: uppercase; margin-top: 16px; }
        
        /* Dashboard Layout */
        #dashboard { display: flex; flex-direction: column; height: 100vh; }
        header { background: white; padding: 0 24px; height: 64px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ecs-border); }
        .search-container { padding: 24px; background: white; display: flex; flex-direction: column; align-items: center; }
        #searchBar { width: 100%; max-width: 800px; padding: 16px 20px; border: 1px solid var(--ecs-border); border-radius: 100px; font-size: 16px; background: var(--ecs-bg); outline: none; transition: 0.3s; }
        #searchBar:focus { background: white; border-color: var(--ecs-orange); box-shadow: 0 0 0 4px rgba(212, 99, 30, 0.1); }

        .table-wrapper { flex: 1; overflow: auto; background: white; margin: 0 24px 24px 24px; border: 1px solid var(--ecs-border); border-radius: 8px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12px; }
        th { background: #F9FAFB; padding: 16px; border-bottom: 1px solid var(--ecs-border); position: sticky; top: 0; text-align: left; }
        td { padding: 12px 16px; border-bottom: 1px solid var(--ecs-border); white-space: nowrap; }
        
        /* Loading Overlay */
        #sync-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .progress-bar { width: 200px; height: 4px; background: #eee; margin-top: 20px; }
        .progress-fill { height: 100%; background: var(--ecs-orange); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>FAST</h1>
            <p style="font-size:10px; color:#999; margin-bottom:20px;">ECS ASBESTOS</p>
            <input type="text" id="userInput" placeholder="Email Address">
            <input type="password" id="passInput" placeholder="Password">
            <button class="primary" onclick="handleLogin()">Log In</button>
            <p id="loginStatus" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="sync-overlay" class="hidden">
        <h2 style="font-family:Montserrat; color:var(--ecs-orange)">SYNCING XCELERATE</h2>
        <p style="font-size:12px;">Downloading data for instant searching...</p>
        <div class="progress-bar"><div id="p-fill" class="progress-fill"></div></div>
    </div>

    <div id="dashboard" class="hidden">
        <header>
            <div style="font-family:Montserrat; font-size:1.2rem;">F<span style="color:var(--ecs-orange)">A</span>ST</div>
            <button onclick="logout()" style="padding:6px 12px; cursor:pointer;">Logout</button>
        </header>
        <div class="search-container">
            <input type="text" id="searchBar" oninput="instantSearch()" placeholder="Search all records instantly...">
            <p id="result-count" style="font-size:11px; color:#999; margin-top:8px;"></p>
        </div>
        <div class="table-wrapper">
            <div id="table-output"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwarttJ3JBpEyGUGCROHx7ctdpX9xEMj8qrgX48huawx5-xEWtvx55NU3oR-frBxDfcyQ/exec";
        let MASTER_DATA = [];
        let HEADERS = [];

        window.onload = () => { if (localStorage.getItem("fast_auth") === "true") startSession(); };

        async function handleLogin() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`);
                const data = await res.json();
                if(data.result === "success") {
                    localStorage.setItem("fast_auth", "true");
                    startSession();
                } else { document.getElementById('loginStatus').innerText = "Invalid Login"; }
            } catch(e) { alert("Server Error"); }
        }

        async function startSession() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('sync-overlay').classList.remove('hidden');
            const fill = document.getElementById('p-fill');
            
            fill.style.width = "40%";
            
            try {
                // Modified the "search" action to return EVERYTHING if no query is sent
                const res = await fetch(`${SCRIPT_URL}?action=search&q=`); 
                const json = await res.json();
                
                HEADERS = json.headers;
                MASTER_DATA = json.data; // Now we have all 100 columns cached in memory
                
                fill.style.width = "100%";
                setTimeout(() => {
                    document.getElementById('sync-overlay').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                }, 500);
            } catch(e) { alert("Failed to download data."); }
        }

        function instantSearch() {
            const q = document.getElementById("searchBar").value.toUpperCase();
            if(q.length < 2) { 
                document.getElementById('table-output').innerHTML = ""; 
                return; 
            }

            // INSTANT filtering from local memory
            const filtered = MASTER_DATA.filter(row => row.join(" ").toUpperCase().includes(q)).slice(0, 50);
            renderTable(filtered);
            document.getElementById('result-count').innerText = `Showing top ${filtered.length} matches`;
        }

        function renderTable(rows) {
            let html = `<table><thead><tr>`;
            HEADERS.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            rows.forEach(row => {
                html += `<tr>`;
                row.forEach(cell => html += `<td>${cell || ''}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('table-output').innerHTML = html;
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
