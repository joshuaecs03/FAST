<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #1F2937; --ecs-bg: #F3F4F6; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--ecs-bg); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .hidden { display: none !important; }
        
        .login-card { background: white; padding: 50px; border-radius: 16px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 360px; z-index: 50; }
        .btn-login { width: 100%; padding: 14px; background: var(--ecs-orange); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        #dashboard { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; overflow-y: auto; }
        .nav-bar { background: var(--ecs-dark); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Montserrat'; font-weight: 700; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 class="logo" style="color:black; font-size: 2.5rem; margin-bottom: 10px;">F<span style="color:var(--ecs-orange)">A</span>ST</h1>
            <p style="color: #6B7280; margin-bottom: 30px; font-size: 14px;">Authorized @ecs-asbestos.com Access</p>
            
            <button class="btn-login" onclick="startAuth()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_\"G\"_Logo.svg" width="18" alt="">
                Sign in with Google
            </button>
            
            <p id="auth-status" style="font-size: 11px; color: #9CA3AF; margin-top: 20px;">Secure Workspace Login</p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="nav-bar">
            <div class="logo">F<span style="color:var(--ecs-orange)">A</span>ST</div>
            <div style="display:flex; align-items:center; gap:20px;">
                <span id="user-display" style="font-size:12px; opacity:0.8;"></span>
                <button onclick="logout()" style="background:rgba(255,255,255,0.1); border:none; color:white; padding:5px 12px; border-radius:4px; cursor:pointer; font-size:11px;">Logout</button>
            </div>
        </nav>
        <div style="padding: 40px;">
            <h3>Project Management Console</h3>
            <p id="data-status" style="color:#6B7280; font-size:13px;">Synchronizing with Xcelerate Data...</p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxVYrXr-8qJwV2m2oR2SMFIsfd-otL528yhnLMOOWA_3ZgUhtNZeMJmqoQcHMCZpHheLw/exec";

        function startAuth() {
            document.getElementById('auth-status').innerText = "Authenticating... check popup.";
            window.open(`${SCRIPT_URL}?action=user_login`, "FAST_Auth", "width=500,height=600");
        }

        // IMPROVED HANDSHAKE LISTENER
        window.addEventListener("message", (event) => {
            // Safety Check: We only care about success/denied results
            if (event.data && event.data.result) {
                if (event.data.result === "success") {
                    console.log("Login Success:", event.data.email);
                    localStorage.setItem("fast_verified", "true");
                    localStorage.setItem("fast_email", event.data.email);
                    enterDashboard();
                } else if (event.data.result === "denied") {
                    alert("ACCESS DENIED\n" + event.data.email + " is not an @ecs-asbestos.com account.");
                    document.getElementById('auth-status').innerText = "Access Denied.";
                }
            }
        }, false);

        function enterDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-display').innerText = localStorage.getItem("fast_email");
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        // Auto-login on reload if already verified
        window.onload = () => {
            if(localStorage.getItem("fast_verified") === "true") enterDashboard();
        };
    </script>
</body>
</html>
