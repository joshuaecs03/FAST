<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST Portal | ECS Asbestos</title>
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #333333; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f4f4f4; color: var(--ecs-dark); }
        .hidden { display: none !important; }
        
        /* Login UI */
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { background: white; padding: 40px; border-top: 5px solid var(--ecs-orange); width: 320px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--ecs-orange); margin: 0; font-size: 2.2rem; letter-spacing: 3px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: var(--ecs-orange); color: white; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }

        /* Portal UI */
        header { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--ecs-orange); }
        .search-container { padding: 30px; background: white; text-align: center; border-bottom: 1px solid #eee; }
        #searchBar { width: 70%; padding: 15px; border: 1px solid #ddd; border-left: 5px solid var(--ecs-orange); font-size: 16px; border-radius: 4px; }
        
        /* Table Styling (Report Style) */
        .table-wrapper { overflow: auto; height: calc(100vh - 185px); background: white; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #fafafa; color: #888; text-transform: uppercase; padding: 12px; border: 1px solid #eee; position: sticky; top: 0; }
        td { border: 1px solid #f0f0f0; padding: 10px; white-space: nowrap; }
        tr:hover { background: #fff9f5; }

        .loader { margin: 10px; color: var(--ecs-orange); font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card">
            <h1>FAST</h1>
            <p style="font-size: 10px; color: #999; letter-spacing: 1px;">ECS ASBESTOS PORTAL</p>
            <input type="text" id="u" placeholder="Email Address">
            <input type="password" id="p" placeholder="Password">
            <button onclick="handleLogin()">Sign In</button>
            <p id="status" style="color: red; font-size: 11px;"></p>
        </div>
    </div>

    <div id="portal" class="hidden">
        <header>
            <div style="font-weight: bold; color: var(--ecs-orange);">FAST PORTAL</div>
            <button onclick="logout()" style="background:#666; color:white; border:none; padding: 5px 10px; font-size: 10px; cursor:pointer;">LOGOUT</button>
        </header>
        
        <div class="search-container">
            <input type="text" id="searchBar" oninput="debounceSearch()" placeholder="Type to search Xcelerate (Job #, State, Client)...">
            <div id="search-loader" class="loader hidden">Searching Server...</div>
        </div>

        <div id="table-output" class="table-wrapper">
            <p style="text-align:center; color:#ccc; padding-top:50px;">Results will appear here.</p>
        </div>
    </div>

    <script>
        // 1. YOUR DEPLOYMENT URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwarttJ3JBpEyGUGCROHx7ctdpX9xEMj8qrgX48huawx5-xEWtvx55NU3oR-frBxDfcyQ/exec";
        let searchTimer;

        window.onload = function() {
            if (localStorage.getItem("fast_auth") === "true") showPortal();
        };

        async function handleLogin() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`);
            const data = await res.json();
            if (data.result === "success") {
                localStorage.setItem("fast_auth", "true");
                showPortal();
            } else {
                document.getElementById('status').innerText = "Access Denied";
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function showPortal() { 
            document.getElementById('login-screen').classList.add('hidden'); 
            document.getElementById('portal').classList.remove('hidden'); 
        }

        // 2. SERVER-SIDE SEARCH LOGIC (Instant Search)
        function debounceSearch() {
            clearTimeout(searchTimer);
            const q = document.getElementById("searchBar").value;
            if (q.length < 2) return;
            
            document.getElementById("search-loader").classList.remove("hidden");
            searchTimer = setTimeout(() => executeSearch(q), 400); 
        }

        async function executeSearch(query) {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=search&q=${encodeURIComponent(query)}`);
                const json = await res.json();
                renderTable(json.headers, json.data);
            } finally {
                document.getElementById("search-loader").classList.add("hidden");
            }
        }

        function renderTable(headers, rows) {
            const output = document.getElementById("table-output");
            if (rows.length === 0) {
                output.innerHTML = "<p style='text-align:center; padding:50px;'>No matches found.</p>";
                return;
            }
            let html = `<table><thead><tr>`;
            headers.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            rows.forEach(row => {
                html += `<tr>`;
                row.forEach(cell => html += `<td>${cell || ''}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            output.innerHTML = html;
        }
    </script>
</body>
</html>
