<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #1F2937; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #F3F4F6; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .hidden { display: none !important; }
        
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 14px; background: var(--ecs-orange); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        
        #dashboard { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; overflow-y: auto; }
        .nav-bar { background: var(--ecs-dark); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="font-family: Montserrat; letter-spacing: 4px;">F<span style="color:var(--ecs-orange)">A</span>ST</h1>
            <p style="color: #6B7280; font-size: 14px; margin-bottom: 20px;">System Login</p>
            
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            
            <button class="btn-login" onclick="handleLogin()">Login</button>
            <p id="msg" style="color: #EF4444; font-size: 12px; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="nav-bar">
            <div style="font-family: Montserrat; font-weight: 700;">F<span style="color:var(--ecs-orange)">A</span>ST</div>
            <button onclick="logout()" style="background:none; border:1px solid white; color:white; padding:5px 10px; border-radius:4px; cursor:pointer;">Logout</button>
        </nav>
        <div style="padding: 30px;">
            <h2>Project Dashboard</h2>
            <div id="data-output">Loading data...</div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVYrXr-8qJwV2m2oR2SMFIsfd-otL528yhnLMOOWA_3ZgUhtNZeMJmqoQcHMCZpHheLw/exec";

        async function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            
            msg.innerText = "Verifying...";
            
            try {
                const response = await fetch(`${SCRIPT_URL}?action=verify_login&user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`);
                const result = await response.json();
                
                if (result.result === "success") {
                    localStorage.setItem("fast_session", "active");
                    showDashboard();
                } else {
                    msg.innerText = "Invalid Username or Password";
                }
            } catch (e) {
                msg.innerText = "Connection Error";
            }
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        function logout() { localStorage.clear(); location.reload(); }
        window.onload = () => { if(localStorage.getItem("fast_session") === "active") showDashboard(); };
    </script>
</body>
</html>
