<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #111827; --ecs-border: #E5E7EB; --ecs-bg: #F9FAFB; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--ecs-bg); color: var(--ecs-dark); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* AUTH UI */
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: #f3f4f6; }
        .login-card { background: white; padding: 60px; border-radius: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); width: 340px; text-align: center; }
        .brand-logo { font-family: 'Montserrat', sans-serif; font-size: 3.2rem; margin: 0 0 40px 0; letter-spacing: 8px; font-weight: 700; color: var(--ecs-dark); }
        .brand-logo span { color: var(--ecs-orange); }
        input.auth-input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--ecs-border); border-radius: 8px; box-sizing: border-box; outline: none; }
        button.primary { width: 100%; padding: 14px; background: var(--ecs-orange); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; text-transform: uppercase; margin-top: 10px; }

        /* DASHBOARD */
        #dashboard { display: flex; flex-direction: column; height: 100vh; }
        header { background: white; padding: 0 30px; height: 70px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ecs-border); }
        .search-area { padding: 20px 30px; background: white; border-bottom: 1px solid var(--ecs-border); display: flex; gap: 15px; align-items: center; justify-content: center; }
        #searchBar { width: 100%; max-width: 600px; padding: 14px 20px; border: 1px solid var(--ecs-border); border-radius: 50px; font-size: 15px; outline: none; }

        /* COLUMN SELECTOR */
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { background: white; border: 1px solid var(--ecs-border); padding: 12px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: white; min-width: 300px; max-height: 500px; overflow-y: auto; box-shadow: 0px 8px 16px rgba(0,0,0,0.1); z-index: 100; border-radius: 8px; padding: 15px; border: 1px solid var(--ecs-border); }
        .dropdown:hover .dropdown-content { display: block; }
        
        .col-item { display: flex; align-items: center; gap: 10px; font-size: 12px; padding: 8px; background: #fff; border: 1px solid #f3f3f3; margin-bottom: 4px; border-radius: 4px; cursor: grab; }
        .col-item:active { cursor: grabbing; }
        .handle { color: #ccc; cursor: grab; padding-right: 5px; }

        /* TABLE */
        .table-wrapper { flex: 1; overflow: auto; background: white; margin: 15px 25px; border-radius: 8px; border: 1px solid var(--ecs-border); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12px; }
        th { background: #F9FAFB; padding: 14px; border-bottom: 1px solid var(--ecs-border); position: sticky; top: 0; text-align: left; font-weight: 600; color: #6B7280; text-transform: uppercase; font-size: 10px; z-index: 20; }
        td { padding: 10px 14px; border-bottom: 1px solid var(--ecs-border); white-space: nowrap; color: #374151; }
        
        td:first-child, th:first-child { position: sticky; left: 0; background: inherit; z-index: 21; border-right: 1px solid var(--ecs-border); }
        th:first-child { z-index: 30; background: #F9FAFB; }
        tr:hover td { background-color: #FFF9F5; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <div class="brand-logo">F<span>A</span>ST</div>
            <input type="text" id="u" class="auth-input" placeholder="Email Address">
            <input type="password" id="p" class="auth-input" placeholder="Password">
            <button class="primary" onclick="handleLogin()">Log In</button>
            <p id="loginStatus" style="color:red; font-size:12px; margin-top:15px;"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <header>
            <div class="brand-logo" style="font-size: 1.5rem; margin: 0; letter-spacing: 4px;">F<span>A</span>ST</div>
            <button onclick="logout()" style="background:none; border:1px solid #ddd; padding:5px 15px; cursor:pointer; border-radius:5px; font-size:11px;">Logout</button>
        </header>
        
        <div class="search-area">
            <input type="text" id="searchBar" oninput="instantSearch()" placeholder="Initial sync..." disabled>
            <div class="dropdown">
                <button class="dropbtn">⚙️ Columns</button>
                <div class="dropdown-content">
                    <p style="margin:0 0 10px 0; font-size:11px; color:#666;">Drag to reorder. Check to show.</p>
                    <div id="checkbox-list"></div>
                </div>
            </div>
        </div>

        <div class="table-wrapper"><div id="table-output"></div></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoO-wu2p2j463ePFB5kW59yv45-hxBo7gV8EK0hqbV5t5q1MVn2K8nvWIOFmk4Q0OxSA/exec";
        let CACHE = [];
        let COLUMN_DEFS = []; // Stores objects: { name: string, visible: bool, index: original_index }

        const DEFAULT_COLS = ["File Number", "File Name", "Status", "Customer Name", "Loss Address", "State", "Insurance Company", "Referred By", "Referred By Organization Name", "Assigned Adjuster"];

        window.onload = () => { if (localStorage.getItem("fast_active") === "true") init(); };

        async function handleLogin() {
            const u = document.getElementById('u').value, p = document.getElementById('p').value;
            const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`);
            const data = await res.json();
            if(data.result === "success") { localStorage.setItem("fast_active", "true"); init(); }
            else { document.getElementById('loginStatus').innerText = "Access Denied"; }
        }

        async function init() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            
            const res = await fetch(`${SCRIPT_URL}?action=search&q=`); 
            const json = await res.json();
            const rawHeaders = json.headers;
            CACHE = json.data;

            // Load saved order or create new
            const saved = localStorage.getItem("fast_col_order_v2");
            if (saved) {
                COLUMN_DEFS = JSON.parse(saved);
            } else {
                // Initialize with your requested defaults first
                const ordered = [];
                DEFAULT_COLS.forEach(name => {
                    let idx = rawHeaders.indexOf(name);
                    if(idx !== -1) ordered.push({ name: name, visible: true, index: idx });
                });
                // Add the rest as hidden
                rawHeaders.forEach((name, idx) => {
                    if(!DEFAULT_COLS.includes(name)) ordered.push({ name: name, visible: false, index: idx });
                });
                COLUMN_DEFS = ordered;
            }

            buildColSelector();
            const sb = document.getElementById('searchBar');
            sb.disabled = false; sb.placeholder = "Search records...";
        }

        function buildColSelector() {
            const list = document.getElementById('checkbox-list');
            list.innerHTML = "";
            COLUMN_DEFS.forEach((col, i) => {
                const item = document.createElement('div');
                item.className = 'col-item';
                item.setAttribute('data-id', i);
                item.innerHTML = `<span class="handle">⠿</span><input type="checkbox" id="c-${i}" ${col.visible ? 'checked' : ''} onchange="toggle(${i})"><label style="flex:1; margin-left:8px;">${col.name}</label>`;
                list.appendChild(item);
            });

            new Sortable(list, {
                handle: '.handle',
                animation: 150,
                onEnd: (evt) => {
                    const movedItem = COLUMN_DEFS.splice(evt.oldIndex, 1)[0];
                    COLUMN_DEFS.splice(evt.newIndex, 0, movedItem);
                    saveAndRender();
                }
            });
        }

        function toggle(i) { COLUMN_DEFS[i].visible = !COLUMN_DEFS[i].visible; saveAndRender(); }
        function saveAndRender() {
            localStorage.setItem("fast_col_order_v2", JSON.stringify(COLUMN_DEFS));
            instantSearch();
        }

        function instantSearch() {
            const q = document.getElementById("searchBar").value.toUpperCase();
            if(q.length < 2) { document.getElementById('table-output').innerHTML = ""; return; }
            const filtered = CACHE.filter(r => r.join(" ").toUpperCase().includes(q)).slice(0, 100);
            render(filtered);
        }

        function render(rows) {
            const visibleDefs = COLUMN_DEFS.filter(c => c.visible);
            let html = `<table><thead><tr>`;
            visibleDefs.forEach(c => html += `<th>${c.name}</th>`);
            html += `</tr></thead><tbody>`;
            rows.forEach(row => {
                html += `<tr>`;
                visibleDefs.forEach(c => html += `<td>${row[c.index] || ''}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('table-output').innerHTML = html;
        }

        function logout() { localStorage.removeItem("fast_active"); location.reload(); }
    </script>
</body>
</html>
