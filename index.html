<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #111827; --ecs-border: #E5E7EB; --ecs-bg: #F9FAFB; --sidebar-width: 280px; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--ecs-bg); color: var(--ecs-dark); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* LOGIN */
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: #f3f4f6; }
        .login-card { background: white; padding: 50px; border-radius: 12px; width: 360px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-login { width: 100%; padding: 14px; background: var(--ecs-orange); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* DASHBOARD */
        #dashboard { display: flex; height: 100vh; }
        #sidebar { width: var(--sidebar-width); background: #1F2937; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 30px; border-bottom: 1px solid #374151; }
        .sidebar-logo { font-family: 'Montserrat', sans-serif; color: white; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; font-size: 1.6rem; }
        .sidebar-logo span { color: var(--ecs-orange); }

        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; position: relative; }
        header { background: white; padding: 0 20px; height: 70px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ecs-border); }
        
        /* TABLE */
        .table-wrapper { flex: 1; overflow: auto; margin: 10px; border: 1px solid var(--ecs-border); border-radius: 8px; }
        table { width: max-content; min-width: 100%; border-collapse: separate; border-spacing: 0; font-size: 11px; table-layout: fixed; } 
        th { background: #F9FAFB; padding: 0; position: sticky; top: 0; text-align: left; z-index: 10; border-bottom: 2px solid var(--ecs-border); border-right: 1px solid #f0f0f0; }
        .th-content { padding: 12px 15px; display: flex; align-items: center; position: relative; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--ecs-border); color: #374151; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        tr:hover td { background-color: #FFF9F5; }

        /* DRAWER */
        #audit-drawer { position: fixed; right: -500px; top: 0; width: 450px; height: 100vh; background: white; border-left: 1px solid var(--ecs-border); transition: 0.3s ease; z-index: 2000; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.05); }
        #audit-drawer.open { right: 0; }
        .drawer-header { padding: 20px; border-bottom: 1px solid var(--ecs-border); display: flex; justify-content: space-between; align-items: center; }
        .drawer-body { flex: 1; overflow-y: auto; padding: 20px; background: #F3F4F6; }
        .log-entry { margin-bottom: 15px; padding: 15px; border-radius: 12px; font-size: 13px; background: white; border: 1px solid var(--ecs-border); }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <div class="sidebar-logo" style="color:black; font-size:3.5rem; margin-bottom: 30px;">F<span>A</span>ST</div>
            <p style="color: #6B7280; margin-bottom: 40px;">Workspace Sign-In & CRM Access</p>
            <button class="btn-login" onclick="startAuth()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_\"G\"_Logo.svg" width="18" alt="">
                Sign in with Google
            </button>
        </div>
    </div>

    <div id="overlay" onclick="closeDrawer()"></div>

    <div id="audit-drawer">
        <div class="drawer-header">
            <div><h3 id="drawer-title" style="margin:0;">Job Details</h3><span id="drawer-subtitle" style="font-size:12px; color:#9CA3AF;">File #</span></div>
            <button onclick="closeDrawer()" style="background:none; border:none; font-size:20px; cursor:pointer;">✕</button>
        </div>
        <div class="drawer-body" id="audit-content"></div>
        <div style="padding:20px; border-top:1px solid var(--ecs-border); background:white;">
            <p style="font-size:10px; color:#10B981; margin:0 0 10px 0;">✓ Logged in as <span id="user-display">...</span></p>
            <button class="btn-login" style="font-size:14px; padding:10px;">Send Manual Follow-up</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav id="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo">F<span>A</span>ST</div></div>
            <div class="nav-label">Status Views</div>
            <div class="nav-item active" onclick="setView('All Jobs', this)"><span>All Jobs</span></div>
            <div style="margin-top:auto; padding:20px;"><button onclick="logout()" style="width:100%; background:none; border:1px solid #4B5563; color:#9CA3AF; padding:10px; cursor:pointer; border-radius:6px;">Logout</button></div>
        </nav>
        <main id="main-content">
            <header><div><h2 id="view-title" style="margin:0;">All Jobs</h2></div><div id="sync-status" style="font-size:10px; color:#9CA3AF;">Syncing...</div></header>
            <div class="controls-area"><input type="text" id="searchBar" oninput="instantSearch()" placeholder="Search data..."></div>
            <div class="table-wrapper"><div id="table-output"></div></div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/a/macros/ecs-asbestos.com/s/AKfycbyoO-wu2p2j463ePFB5kW59yv45-hxBo7gV8EK0hqbV5t5q1MVn2K8nvWIOFmk4Q0OxSA/exec";
        
        function startAuth() { window.open(`${SCRIPT_URL}?action=user_login`, "Auth", "width=500,height=600"); }

        window.addEventListener("message", (event) => {
            if (event.data && event.data.result === "success") {
                localStorage.setItem("fast_active", "true");
                localStorage.setItem("fast_user_email", event.data.email);
                init();
            } else if (event.data && event.data.result === "denied") { 
                alert(event.data.message); 
            }
        }, false);

        let UI_CACHE = JSON.parse(localStorage.getItem('fast_data_cache') || "[]");
        let ROW_HASHES = JSON.parse(localStorage.getItem('fast_hash_cache') || "{}");
        let HEADERS = JSON.parse(localStorage.getItem('fast_headers_cache') || "[]");
        let COLUMN_DEFS = [];

        window.onload = () => { if (localStorage.getItem("fast_active") === "true") init(); };

        async function init() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-display').innerText = localStorage.getItem('fast_user_email');
            await performSurgicalSync();
            setInterval(performSurgicalSync, 15000);
        }

        async function performSurgicalSync() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=sync_surgical&hashes=${encodeURIComponent(JSON.stringify(ROW_HASHES))}`);
                const json = await res.json();
                if (json.result === "success" && json.updates.length > 0) {
                    HEADERS = json.headers;
                    COLUMN_DEFS = HEADERS.map(h => ({ name: h, visible: true, width: 120 }));
                    const fIdx = HEADERS.indexOf("File Number");
                    json.updates.forEach(up => {
                        const fNum = up.data[fIdx].toString();
                        const exIdx = UI_CACHE.findIndex(r => r[fIdx].toString() === fNum);
                        if(exIdx !== -1) UI_CACHE[exIdx] = up.data; else UI_CACHE.unshift(up.data);
                        ROW_HASHES[fNum] = up.hash;
                    });
                    localStorage.setItem('fast_data_cache', JSON.stringify(UI_CACHE));
                    localStorage.setItem('fast_hash_cache', JSON.stringify(ROW_HASHES));
                    renderTable();
                }
                document.getElementById('sync-status').innerText = "✓ " + new Date().toLocaleTimeString();
            } catch(e) {}
        }

        function renderTable() {
            const fileIdx = HEADERS.indexOf("File Number"), nameIdx = HEADERS.indexOf("File Name");
            if(fileIdx === -1) return;
            let html = `<table><thead><tr>`;
            COLUMN_DEFS.forEach(def => html += `<th style="width:${def.width}px"><div class="th-content">${def.name}</div></th>`);
            html += `</tr></thead><tbody>`;
            UI_CACHE.forEach(r => {
                html += `<tr onclick="openDrawer('${r[fileIdx]}', '${r[nameIdx]}')">`;
                COLUMN_DEFS.forEach(def => html += `<td>${r[HEADERS.indexOf(def.name)] || ''}</td>`);
                html += `</tr>`;
            });
            document.getElementById('table-output').innerHTML = html + `</tbody></table>`;
        }

        async function openDrawer(fileNum, fileName) {
            document.getElementById('audit-drawer').classList.add('open');
            document.getElementById('overlay').classList.add('open');
            document.getElementById('drawer-title').innerText = fileName;
            document.getElementById('drawer-subtitle').innerText = "File #: " + fileNum;
            const res = await fetch(`${SCRIPT_URL}?action=get_audit_logs&fileNum=${fileNum}`);
            const data = await res.json();
            document.getElementById('audit-content').innerHTML = data.logs.map(l => `<div class="log-entry"><strong>${l.Type}</strong><br>${l.Body}</div>`).join('') || "No logs found.";
        }

        function closeDrawer() { document.getElementById('audit-drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
        function logout() { localStorage.clear(); location.reload(); }
        function instantSearch() { renderTable(); }
    </script>
</body>
</html>
