<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #111827; --ecs-border: #E5E7EB; --ecs-bg: #F9FAFB; --sidebar-width: 280px; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--ecs-bg); color: var(--ecs-dark); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        #dashboard { display: flex; height: 100vh; position: relative; }
        
        /* SIDEBAR */
        #sidebar { width: var(--sidebar-width); background: #1F2937; color: white; display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.3s ease; z-index: 1000; }
        .sidebar-header { padding: 30px; border-bottom: 1px solid #374151; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-logo { font-family: 'Montserrat', sans-serif; color: white; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; font-size: 1.6rem; }
        .sidebar-logo span { color: var(--ecs-orange); }

        .nav-label { font-size: 10px; color: #6B7280; padding: 25px 30px 5px 30px; text-transform: uppercase; font-weight: 600; }
        .nav-item { padding: 16px 30px; cursor: pointer; font-size: 13px; color: #9CA3AF; transition: 0.2s; border-left: 4px solid transparent; display: flex; align-items: center; justify-content: space-between; }
        .nav-item.active { background: #111827; color: white; border-left: 4px solid var(--ecs-orange); font-weight: 600; }
        .nav-count { font-size: 10px; background: #374151; color: #9CA3AF; padding: 2px 8px; border-radius: 10px; }
        .connected { background: #10b981 !important; color: white !important; }

        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; width: 100%; position: relative; }
        header { background: white; padding: 0 20px; height: 70px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ecs-border); }
        .menu-toggle { display: none; background: none; border: none; font-size: 24px; cursor: pointer; padding: 10px; }

        /* CONTROLS */
        .controls-area { padding: 15px 20px; border-bottom: 1px solid var(--ecs-border); display: flex; align-items: center; gap: 10px; background: #fff; }
        #searchBar { flex: 1; padding: 10px 15px; border: 1px solid var(--ecs-border); border-radius: 50px; outline: none; font-size: 14px; }
        #col-btn { background: white; border: 1px solid var(--ecs-border); padding: 8px 15px; border-radius: 50px; cursor: pointer; font-size: 12px; font-weight: 600; }
        
        /* TABLE */
        .table-wrapper { flex: 1; overflow: auto; margin: 10px; border: 1px solid var(--ecs-border); border-radius: 8px; }
        table { width: max-content; min-width: 100%; border-collapse: separate; border-spacing: 0; font-size: 11px; table-layout: fixed; } 
        th { background: #F9FAFB; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--ecs-border); border-right: 1px solid #f0f0f0; }
        .th-content { padding: 12px 15px; display: flex; align-items: center; position: relative; height: 100%; box-sizing: border-box; }
        .resizer { width: 8px; height: 100%; position: absolute; right: 0; top: 0; cursor: col-resize; z-index: 11; }
        td { padding: 10px 15px; border-bottom: 1px solid var(--ecs-border); color: #374151; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        tr:hover td { background-color: #FFF9F5; }

        /* AUDIT DRAWER (Zendesk Style) */
        #audit-drawer {
            position: fixed; right: -500px; top: 0; width: 450px; height: 100vh;
            background: white; border-left: 1px solid var(--ecs-border);
            transition: 0.3s ease; z-index: 2000; display: flex; flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
        }
        #audit-drawer.open { right: 0; }
        .drawer-header { padding: 20px; border-bottom: 1px solid var(--ecs-border); display: flex; justify-content: space-between; align-items: center; }
        .drawer-body { flex: 1; overflow-y: auto; padding: 20px; background: #F3F4F6; }
        
        /* TIMELINE CARDS */
        .log-entry { margin-bottom: 15px; padding: 15px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
        .log-email { background: white; border: 1px solid var(--ecs-border); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .log-note { background: #FEF3C7; border: 1px solid #FDE68A; } /* Internal Note Style */
        .log-meta { font-size: 10px; color: #9CA3AF; margin-bottom: 8px; display: flex; justify-content: space-between; }

        /* COLUMN MANAGER DROPDOWN */
        .col-dropdown { position: absolute; right: 20px; top: 130px; background: white; border: 1px solid var(--ecs-border); border-radius: 12px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); z-index: 100; width: 300px; display: flex; flex-direction: column; max-height: 500px; }
        .col-drop-header { padding: 15px; border-bottom: 1px solid #eee; }
        .col-search { width: 100%; padding: 8px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 10px; box-sizing: border-box; }
        .col-actions { display: flex; gap: 5px; }
        .col-action-btn { flex: 1; font-size: 10px; padding: 5px; cursor: pointer; border: 1px solid #eee; background: #f9f9f9; border-radius: 4px; }
        #col-list { overflow-y: auto; padding: 10px; }
        .col-item { display: flex; align-items: center; gap: 10px; padding: 8px; font-size: 12px; border-radius: 6px; }
        .drag-handle { cursor: grab; color: #ccc; padding-right: 5px; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            #audit-drawer { width: 100%; right: -100%; }
            .menu-toggle { display: block; }
            #overlay.open { display: block; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="text-align:center; padding-top:15vh;">
            <div class="sidebar-logo" style="color:black; font-size:3rem; margin-bottom: 20px;">F<span>A</span>ST</div>
            <div style="width:340px; margin:auto; background:white; padding:40px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.05);">
                <input type="text" id="u" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
                <input type="password" id="p" placeholder="Password" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
                <button onclick="handleLogin()" style="width:100%; padding:14px; background:var(--ecs-orange); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600;">Sign In</button>
            </div>
        </div>
    </div>

    <div id="overlay" onclick="closeAllPanels()"></div>

    <div id="audit-drawer">
        <div class="drawer-header">
            <div>
                <h3 id="drawer-title" style="margin:0;">Job Details</h3>
                <span id="drawer-subtitle" style="font-size:12px; color:#9CA3AF;">File Number</span>
            </div>
            <button onclick="closeDrawer()" style="background:none; border:none; font-size:20px; cursor:pointer;">✕</button>
        </div>
        <div class="drawer-body" id="audit-content">
            </div>
        <div style="padding:20px; border-top:1px solid var(--ecs-border);">
            <button id="reply-btn" style="width:100%; padding:12px; background:var(--ecs-orange); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600;">Manual Follow-up</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">F<span>A</span>ST</div>
                <button class="menu-toggle" style="color:white;" onclick="toggleMenu()">✕</button>
            </div>
            <div class="nav-label">Status Views</div>
            <div class="nav-item active" onclick="setView('All Jobs', this)"><span>All Jobs</span><span class="nav-count" id="count-all">-</span></div>
            <div class="nav-item" onclick="setView('Completed Jobs', this)"><span>Completed</span><span class="nav-count" id="count-comp">-</span></div>
            <div class="nav-item" onclick="setView('Project Awaiting Approval', this)"><span>Awaiting Approval</span><span class="nav-count" id="count-awat">-</span></div>
            
            <div class="nav-label">Integrations</div>
            <div class="nav-item" onclick="connectGmail()">
                <span>Gmail Connection</span>
                <span class="nav-count" id="gmail-status" style="background:#ef4444; color:white;">Disconnected</span>
            </div>

            <div style="margin-top:auto; padding:20px; border-top:1px solid #374151;">
                <button onclick="logout()" style="width:100%; background:none; border:1px solid #4B5563; color:#9CA3AF; padding:10px; cursor:pointer; border-radius:6px;">Logout</button>
            </div>
        </nav>

        <main id="main-content">
            <header>
                <div style="display:flex; align-items:center; gap:10px;">
                    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
                    <h2 id="view-title" style="margin:0;">All Jobs</h2>
                </div>
                <div id="sync-status" style="font-size:10px; color:#9CA3AF;">Syncing...</div>
            </header>
            <div class="controls-area">
                <input type="text" id="searchBar" oninput="instantSearch()" placeholder="Search data...">
                <div class="col-manager">
                    <button id="col-btn" onclick="toggleColMenu()">⚙ Columns</button>
                    <div id="col-dropdown" class="col-dropdown hidden">
                        <div class="col-drop-header">
                            <input type="text" class="col-search" id="colSearch" oninput="filterColMenu()" placeholder="Find a column...">
                            <div class="col-actions">
                                <button class="col-action-btn" onclick="bulkToggleCols(true)">Show All</button>
                                <button class="col-action-btn" onclick="bulkToggleCols(false)">Hide All</button>
                            </div>
                        </div>
                        <div id="col-list"></div>
                    </div>
                </div>
            </div>
            <div class="table-wrapper"><div id="table-output"></div></div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoO-wu2p2j463ePFB5kW59yv45-hxBo7gV8EK0hqbV5t5q1MVn2K8nvWIOFmk4Q0OxSA/exec";
        
        let UI_CACHE = JSON.parse(localStorage.getItem('fast_data_cache') || "[]");
        let ROW_HASHES = JSON.parse(localStorage.getItem('fast_hash_cache') || "{}");
        let HEADERS = JSON.parse(localStorage.getItem('fast_headers_cache') || "[]");
        let COLUMN_DEFS = [], SORT_COL = null, SORT_ASC = true, CURRENT_VIEW = 'All Jobs';

        const DEFAULT_VISIBLE = ["File Number", "File Name", "Claim Number", "Status", "Customer Name", "Loss Address", "State", "Insurance Company", "Referred By", "Referred By Organization Name"];

        window.onload = () => { 
            if (localStorage.getItem("fast_active") === "true") {
                init(); 
                if(UI_CACHE.length > 0) { loadColumnSettings(); renderTable(); renderColMenu(); updateCounts(); }
                checkIntegrations();
            } 
        };

        // --- DRAWER LOGIC ---
        function openDrawer(fileNum, fileName) {
            document.getElementById('drawer-title').innerText = fileName || "Job Details";
            document.getElementById('drawer-subtitle').innerText = "File #: " + fileNum;
            document.getElementById('audit-drawer').classList.add('open');
            document.getElementById('overlay').classList.add('open');
            
            // Mocking Audit Trail until logs tab is synced
            const content = document.getElementById('audit-content');
            content.innerHTML = `
                <div class="log-entry log-email">
                    <div class="log-meta"><span>Insurance (Outgoing)</span><span>10:30 AM</span></div>
                    <strong>Re: Claim #99283</strong><br>Initial inquiry sent to Adjuster.
                </div>
                <div class="log-entry log-note">
                    <div class="log-meta"><span>Internal Note</span><span>11:15 AM</span></div>
                    Spoke to Homeowner, they will be out of town next Tuesday.
                </div>
            `;
        }

        function closeDrawer() {
            document.getElementById('audit-drawer').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
        }

        function closeAllPanels() { toggleMenu(false); closeDrawer(); toggleColMenu(false); }

        // --- REST OF PORTAL LOGIC ---
        async function checkIntegrations() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=check_gmail_auth`);
                const data = await res.json();
                const statusEl = document.getElementById('gmail-status');
                if(data.authenticated) { statusEl.innerText = "Connected"; statusEl.classList.add('connected'); }
            } catch(e) {}
        }

        function connectGmail() {
            const authUrl = `${SCRIPT_URL}?action=auth_gmail`;
            window.open(authUrl, "GoogleAuth", `width=500,height=600`);
            window.addEventListener("message", (e) => { if (e.data === "auth_complete") checkIntegrations(); }, false);
        }

        async function init() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            await performSurgicalSync();
            setInterval(performSurgicalSync, 15000); 
            initSortable();
        }

        async function performSurgicalSync() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=sync_surgical&hashes=${encodeURIComponent(JSON.stringify(ROW_HASHES))}`);
                const json = await res.json();
                if (json.result === "success" && json.updates.length > 0) {
                    HEADERS = json.headers;
                    localStorage.setItem('fast_headers_cache', JSON.stringify(HEADERS));
                    if (COLUMN_DEFS.length === 0) { loadColumnSettings(); renderColMenu(); }
                    const fNumIdx = HEADERS.indexOf("File Number");
                    json.updates.forEach(up => {
                        const fNum = up.data[fNumIdx].toString();
                        const exIdx = UI_CACHE.findIndex(r => r[fNumIdx].toString() === fNum);
                        if(exIdx !== -1) UI_CACHE[exIdx] = up.data; else UI_CACHE.unshift(up.data);
                        ROW_HASHES[fNum] = up.hash;
                    });
                    localStorage.setItem('fast_data_cache', JSON.stringify(UI_CACHE));
                    localStorage.setItem('fast_hash_cache', JSON.stringify(ROW_HASHES));
                    renderTable();
                    updateCounts();
                }
                document.getElementById('sync-status').innerText = "✓ " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            } catch (e) {}
        }

        function loadColumnSettings() {
            const saved = localStorage.getItem('fast_column_layout');
            if (saved) {
                const parsed = JSON.parse(saved);
                COLUMN_DEFS = parsed.filter(p => HEADERS.includes(p.name));
                HEADERS.forEach(h => { if (!COLUMN_DEFS.find(c => c.name === h)) COLUMN_DEFS.push({ name: h, visible: DEFAULT_VISIBLE.includes(h), width: 120 }); });
            } else {
                COLUMN_DEFS = HEADERS.map(h => ({ name: h, visible: DEFAULT_VISIBLE.includes(h), width: (h === "File Number" || h === "State") ? 80 : 120 }));
            }
        }

        function renderTable() {
            const visibleDefs = COLUMN_DEFS.filter(d => d.visible);
            const statusIdx = HEADERS.indexOf("Status");
            const nameIdx = HEADERS.indexOf("File Name");
            const fileIdx = HEADERS.indexOf("File Number");
            const q = document.getElementById("searchBar").value.toUpperCase();
            let filtered = UI_CACHE.filter(row => (CURRENT_VIEW === 'All Jobs' || row[statusIdx] === CURRENT_VIEW) && row.join(" ").toUpperCase().includes(q));
            
            let html = `<table><thead><tr>`;
            visibleDefs.forEach(def => {
                html += `<th style="width: ${def.width}px"><div class="th-content"><span class="header-label">${def.name}</span><div class="resizer" onmousedown="startResize(event, '${def.name}')"></div></div></th>`;
            });
            html += `</tr></thead><tbody>`;
            filtered.forEach(r => {
                html += `<tr onclick="openDrawer('${r[fileIdx]}', '${r[nameIdx]}')">`;
                visibleDefs.forEach(def => html += `<td>${r[HEADERS.indexOf(def.name)] || ''}</td>`);
                html += `</tr>`;
            });
            document.getElementById('table-output').innerHTML = html + `</tbody></table>`;
        }

        // Resizers and Draggable menus remain same as previous version...
        let startX, startWidth, colNameForResize;
        function startResize(e, name) { e.stopPropagation(); colNameForResize = name; startX = e.pageX; startWidth = COLUMN_DEFS.find(d => d.name === name).width; document.addEventListener('mousemove', handleMouseMove); document.addEventListener('mouseup', stopResize); }
        function handleMouseMove(e) { const diff = e.pageX - startX; COLUMN_DEFS.find(d => d.name === colNameForResize).width = Math.max(50, startWidth + diff); renderTable(); }
        function stopResize() { document.removeEventListener('mousemove', handleMouseMove); document.removeEventListener('mouseup', stopResize); localStorage.setItem('fast_column_layout', JSON.stringify(COLUMN_DEFS)); }
        function toggleMenu(force) { 
            const s = document.getElementById('sidebar'); 
            const o = document.getElementById('overlay');
            if(force === false) { s.classList.remove('open'); o.classList.remove('open'); }
            else { s.classList.toggle('open'); o.classList.toggle('open'); }
        }
        function toggleColMenu(force) { const d = document.getElementById('col-dropdown'); if(force === false) d.classList.add('hidden'); else d.classList.toggle('hidden'); }
        function renderColMenu() {
            let html = '';
            COLUMN_DEFS.forEach((def, i) => {
                html += `<div class="col-item" data-id="${i}" data-name="${def.name.toLowerCase()}"><span class="drag-handle">::</span><input type="checkbox" ${def.visible ? 'checked' : ''} onchange="toggleVisible(${i})"><span style="flex:1">${def.name}</span></div>`;
            });
            document.getElementById('col-list').innerHTML = html;
        }
        function filterColMenu() { const q = document.getElementById('colSearch').value.toLowerCase(); document.querySelectorAll('.col-item').forEach(item => { item.style.display = item.dataset.name.includes(q) ? 'flex' : 'none'; }); }
        function toggleVisible(i) { COLUMN_DEFS[i].visible = !COLUMN_DEFS[i].visible; localStorage.setItem('fast_column_layout', JSON.stringify(COLUMN_DEFS)); renderTable(); }
        function bulkToggleCols(show) { COLUMN_DEFS.forEach(def => def.visible = show); renderTable(); renderColMenu(); }
        function setView(v, el) { CURRENT_VIEW = v; document.getElementById('view-title').innerText = v; document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); if (window.innerWidth <= 768) toggleMenu(false); renderTable(); }
        function initSortable() { new Sortable(document.getElementById('col-list'), { handle: '.drag-handle', animation: 150, onEnd: (evt) => { const moved = COLUMN_DEFS.splice(evt.oldIndex, 1)[0]; COLUMN_DEFS.splice(evt.newIndex, 0, moved); localStorage.setItem('fast_column_layout', JSON.stringify(COLUMN_DEFS)); renderTable(); }}); }
        function instantSearch() { renderTable(); }
        function logout() { localStorage.clear(); location.reload(); }
        function updateCounts() { /* Re-count sidebar logic */ }
    </script>
</body>
</html>
