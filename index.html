<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST - ECS Asbestos Portal</title>
    <style>
        :root { --primary: #003366; --accent: #c0392b; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f9; }
        .hidden { display: none !important; }
        
        /* Login Screen */
        #login-container { height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: var(--primary); font-size: 3rem; margin: 0; letter-spacing: 5px; }
        .btn-sso { background: #4285F4; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        
        /* Dashboard */
        header { background: var(--primary); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .table-wrapper { padding: 20px; overflow: auto; height: calc(100vh - 100px); }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 11px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; white-space: nowrap; }
        th { background: #f2f2f2; position: sticky; top: 0; z-index: 10; }
        tr:hover { background: #f9f9f9; }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="card">
            <h1>FAST</h1>
            <p>ECS Asbestos Field Analysis & Storage Tracking</p>
            <button class="btn-sso" onclick="startSSO()">Sign in with ECS Google Account</button>
            <p id="status" style="margin-top: 20px; color: #666;"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <header>
            <div style="font-weight: bold; font-size: 1.5rem;">FAST PORTAL</div>
            <div id="user-info"></div>
        </header>
        <div class="table-wrapper" id="table-output">
            <p>Fetching your data from Xcelerate...</p>
        </div>
    </div>

    <script>
        // Your specific ECS Asbestos Web App URL
        const SCRIPT_URL = "https://script.google.com/a/macros/ecs-asbestos.com/s/AKfycbwarttJ3JBpEyGUGCROHx7ctdpX9xEMj8qrgX48huawx5-xEWtvx55NU3oR-frBxDfcyQ/exec";

        async function startSSO() {
            const status = document.getElementById('status');
            status.innerText = "Authenticating...";
            
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getData`);
                const result = await response.json();

                if (result.result === "success") {
                    document.getElementById('login-container').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    document.getElementById('user-info').innerText = `${result.user} (${result.role})`;
                    renderXcelerateData(result.data);
                } else {
                    status.style.color = "red";
                    status.innerText = result.message;
                }
            } catch (err) {
                status.style.color = "red";
                status.innerText = "Error: Please ensure you are logged into your @ecs-asbestos.com account.";
                console.error(err);
            }
        }

        function renderXcelerateData(data) {
            if (!data || data.length === 0) {
                document.getElementById('table-output').innerHTML = "No data found.";
                return;
            }
            
            let html = `<table><thead><tr>`;
            Object.keys(data[0]).forEach(key => {
                html += `<th>${key.replace(/_/g, ' ')}</th>`;
            });
            html += `</tr></thead><tbody>`;
            
            data.forEach(row => {
                html += `<tr>`;
                Object.values(row).forEach(val => html += `<td>${val || ''}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('table-output').innerHTML = html;
        }
    </script>
</body>
</html>
