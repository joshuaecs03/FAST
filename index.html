<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #111827; --sidebar-w: 260px; --border: #E5E7EB; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #F9FAFB; color: #111827; height: 100vh; overflow: hidden; display: flex; }
        .hidden { display: none !important; }

        /* LOGIN SCREEN */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; background: #F3F4F6; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 45px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 340px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 14px; background: var(--ecs-orange); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; }

        /* SIDEBAR (Navigation Panel) */
        #sidebar { width: var(--sidebar-w); background: var(--ecs-dark); color: white; display: flex; flex-direction: column; transition: 0.3s; height: 100vh; flex-shrink: 0; }
        .sidebar-header { padding: 25px; font-family: 'Montserrat'; font-weight: 700; letter-spacing: 3px; font-size: 1.2rem; border-bottom: 1px solid #374151; }
        .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #9CA3AF; transition: 0.2s; border-left: 4px solid transparent; }
        .nav-item:hover, .nav-item.active { background: #1F2937; color: white; border-left-color: var(--ecs-orange); }

        /* MAIN CONTENT */
        #main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; background: white; position: relative; }
        header { padding: 0 20px; height: 70px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        
        /* SEARCH BAR */
        .search-box { position: relative; width: 300px; }
        .search-box input { width: 100%; padding: 10px 12px 10px 35px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; outline: none; }
        .search-box::before { content: '🔍'; position: absolute; left: 12px; top: 10px; font-size: 14px; opacity: 0.4; }

        /* DATA TABLE */
        .table-wrapper { flex: 1; overflow: auto; padding: 0; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; white-space: nowrap; table-layout: auto; }
        th { background: #F9FAFB; padding: 14px 12px; text-align: left; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 10; font-weight: 600; color: #374151; }
        td { padding: 12px; border-bottom: 1px solid var(--border); color: #4B5563; }
        tr:hover td { background: #FFF9F5; cursor: pointer; }

        /* MOBILE OVERLAY & TOGGLE */
        #mobile-toggle { display: none; background: none; border: none; font-size: 24px; cursor: pointer; margin-right: 15px; }
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index: 999; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; left: -100%; z-index: 1000; }
            #sidebar.open { left: 0; }
            #mobile-toggle { display: block; }
            #overlay.visible { display: block; }
            .search-box { width: 160px; }
            header { padding: 0 15px; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="font-family: Montserrat; letter-spacing: 4px; margin-bottom: 30px;">F<span style="color:var(--ecs-orange)">A</span>ST</h1>
            <input type="text" id="user" placeholder="Username" spellcheck="false">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-login" onclick="handleLogin()">Login</button>
            <p id="msg" style="color:#EF4444; font-size:12px; margin-top:15px; min-height:15px;"></p>
        </div>
    </div>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <nav id="sidebar">
        <div class="sidebar-header">F<span style="color:var(--ecs-orange)">A</span>ST</div>
        <div class="nav-item active">📋 Projects</div>
        <div class="nav-item">📈 Analytics</div>
        <div class="nav-item">⚙️ Settings</div>
        <div style="margin-top:auto; padding:20px; border-top:1px solid #374151;">
            <p id="user-display" style="font-size:11px; color:#9CA3AF; margin-bottom:10px;"></p>
            <button onclick="logout()" style="width:100%; background:none; border:1px solid #4B5563; color:white; padding:10px; border-radius:8px; cursor:pointer; font-size:12px;">Logout</button>
        </div>
    </nav>

    <main id="main-content">
        <header>
            <div style="display:flex; align-items:center;">
                <button id="mobile-toggle" onclick="toggleSidebar()">☰</button>
                <h2 style="font-size: 1.1rem; margin:0; font-weight: 600;">Project List</h2>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search projects..." onkeyup="filterTable()">
            </div>
        </header>
        <div class="table-wrapper">
            <div id="table-output" style="padding:20px; color:#9CA3AF;">Syncing Xcelerate data...</div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbys1p_6uN9upT77dculUMzENw3FCiB4jBiog206StyorhrC7fPrS63mLQvvthhmXIepMA/exec";
        let RAW_DATA = [], HEADERS = [];

        async function handleLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const msg = document.getElementById('msg');
            msg.innerText = "Connecting...";
            try {
                const res = await fetch(`${SCRIPT_URL}?action=verify_login&user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`);
                const data = await res.json();
                if (data.result === "success") {
                    localStorage.setItem("fast_auth", "true");
                    localStorage.setItem("fast_user", user);
                    initApp();
                } else { msg.innerText = "Invalid credentials"; }
            } catch (e) { msg.innerText = "Connection Failed."; }
        }

        async function initApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('user-display').innerText = "User: " + localStorage.getItem("fast_user");
            await loadData();
        }

        async function loadData() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=sync_data`);
                const json = await res.json();
                if(json.result === "success") {
                    HEADERS = json.headers;
                    RAW_DATA = json.rows;
                    renderTable(RAW_DATA);
                }
            } catch(e) { document.getElementById('table-output').innerText = "Sync Failed."; }
        }

        function renderTable(rows) {
            if (rows.length === 0) {
                document.getElementById('table-output').innerHTML = '<p style="padding:20px;">No results found.</p>';
                return;
            }
            let html = `<table><thead><tr>`;
            HEADERS.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            rows.forEach(row => {
                html += `<tr>`;
                row.forEach(cell => html += `<td>${cell || ''}</td>`);
                html += `</tr>`;
            });
            document.getElementById('table-output').innerHTML = html + `</tbody></table>`;
        }

        function filterTable() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = RAW_DATA.filter(row => row.some(cell => String(cell).toLowerCase().includes(val)));
            renderTable(filtered);
        }

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('open'); 
            document.getElementById('overlay').classList.toggle('visible'); 
        }
        function logout() { localStorage.clear(); location.reload(); }
        window.onload = () => { if(localStorage.getItem("fast_auth") === "true") initApp(); };
    </script>
</body>
</html>
