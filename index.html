<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST | ECS Asbestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ecs-orange: #D4631E; --ecs-dark: #111827; --ecs-border: #E5E7EB; --ecs-bg: #F9FAFB; --sidebar-width: 280px; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--ecs-bg); color: var(--ecs-dark); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        
        /* Login UI */
        #login-screen { text-align: center; padding-top: 15vh; height: 100vh; background: var(--ecs-bg); }
        .login-card { width: 340px; margin: 40px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .sidebar-logo { font-family: 'Montserrat', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; font-size: 2rem; color: black; }
        .sidebar-logo span { color: var(--ecs-orange); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 14px; background: var(--ecs-orange); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        
        /* Dashboard UI */
        #dashboard { display: flex; height: 100vh; }
        #sidebar { width: var(--sidebar-width); background: #1F2937; color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px; border-bottom: 1px solid #374151; }
        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
        header { background: white; padding: 0 30px; height: 70px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ecs-border); }
        .table-wrapper { flex: 1; overflow: auto; margin: 20px; border: 1px solid var(--ecs-border); border-radius: 8px; }
        table { width: max-content; min-width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #F9FAFB; padding: 12px; position: sticky; top: 0; text-align: left; border-bottom: 2px solid var(--ecs-border); }
        td { padding: 10px 12px; border-bottom: 1px solid var(--ecs-border); white-space: nowrap; }
        #sync-status { font-size: 11px; color: #9CA3AF; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="sidebar-logo">F<span>A</span>ST</div>
        <div class="login-card">
            <input type="text" id="u" placeholder="Email">
            <input type="password" id="p" placeholder="Password">
            <button onclick="handleLogin()" id="login-btn">Sign In</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav id="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo" style="color:white; font-size:1.5rem;">F<span>A</span>ST</div></div>
            <div style="padding:20px; color:#9CA3AF; font-size:12px;">Welcome back</div>
            <div style="margin-top:auto; padding:20px;"><button onclick="logout()" style="background:#374151;">Logout</button></div>
        </nav>
        <main id="main-content">
            <header><h2>All Jobs</h2><div id="sync-status">Initializing...</div></header>
            <div class="table-wrapper" id="table-output">
                <p style="padding:20px;">Loading data...</p>
            </div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbys1p_6uN9upT77dculUMzENw3FCiB4jBiog206StyorhrC7fPrS63mLQvvthhmXIepMA/exec";
        
        let UI_CACHE = JSON.parse(localStorage.getItem('fast_data_cache') || "[]");
        let ROW_HASHES = JSON.parse(localStorage.getItem('fast_hash_cache') || "{}");
        let HEADERS = JSON.parse(localStorage.getItem('fast_headers_cache') || "[]");

        window.onload = () => {
            if (localStorage.getItem("fast_active") === "true") {
                showDashboard();
            }
        };

        async function handleLogin() {
            const u = document.getElementById('u').value.trim();
            const p = document.getElementById('p').value.trim();
            const btn = document.getElementById('login-btn');
            
            if(!u || !p) return alert("Enter credentials");
            btn.innerText = "Checking...";

            try {
                const url = `${SCRIPT_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`;
                const res = await fetch(url, { method: 'GET', mode: 'cors', redirect: 'follow' });
                const data = await res.json();
                
                if(data.result === "success") {
                    localStorage.setItem("fast_active", "true");
                    showDashboard();
                } else {
                    alert("Error: " + data.reason);
                    btn.innerText = "Sign In";
                }
            } catch (e) {
                alert("Connection error. Check script deployment.");
                btn.innerText = "Sign In";
            }
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            if(UI_CACHE.length > 0) renderTable();
            performSurgicalSync();
            setInterval(performSurgicalSync, 15000);
        }

        async function performSurgicalSync() {
            try {
                const url = `${SCRIPT_URL}?action=sync_surgical&hashes=${encodeURIComponent(JSON.stringify(ROW_HASHES))}`;
                const res = await fetch(url, { method: 'GET', mode: 'cors', redirect: 'follow' });
                const json = await res.json();
                
                if (json.result === "success") {
                    HEADERS = json.headers;
                    localStorage.setItem('fast_headers_cache', JSON.stringify(HEADERS));
                    
                    if (json.updates.length > 0) {
                        const fNumIdx = HEADERS.indexOf("File Number");
                        json.updates.forEach(up => {
                            const fNum = String(up.data[fNumIdx]);
                            const exIdx = UI_CACHE.findIndex(r => String(r[fNumIdx]) === fNum);
                            if(exIdx !== -1) UI_CACHE[exIdx] = up.data; else UI_CACHE.unshift(up.data);
                            ROW_HASHES[fNum] = up.hash;
                        });
                        localStorage.setItem('fast_data_cache', JSON.stringify(UI_CACHE));
                        localStorage.setItem('fast_hash_cache', JSON.stringify(ROW_HASHES));
                        renderTable();
                    }
                    document.getElementById('sync-status').innerText = "✓ Live: " + new Date().toLocaleTimeString();
                }
            } catch (e) { document.getElementById('sync-status').innerText = "⚠ Sync Error"; }
        }

        function renderTable() {
            if(!HEADERS.length) return;
            let html = `<table><thead><tr>`;
            HEADERS.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            UI_CACHE.forEach(r => {
                html += `<tr>`;
                r.forEach(cell => html += `<td>${cell || ''}</td>`);
                html += `</tr>`;
            });
            document.getElementById('table-output').innerHTML = html + `</tbody></table>`;
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
